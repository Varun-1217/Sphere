/* ── DOM helpers ── */
function E(tag, attrs) {
  const el = document.createElement(tag);
  const kids = Array.prototype.slice.call(arguments, 2);
  for (const k in attrs||{}) {
    const v = attrs[k];
    if (!v && v !== 0) continue;
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on") && typeof v === "function") el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for (let i=0; i<kids.length; i++) {
    const c = kids[i];
    if (c == null || c === false || c === "") continue;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return el;
}
function D(a) { return E.apply(null, ["div", a].concat(Array.prototype.slice.call(arguments, 1))); }
function Sp(a) { return E.apply(null, ["span", a].concat(Array.prototype.slice.call(arguments, 1))); }
function Bt(a) { return E.apply(null, ["button", a].concat(Array.prototype.slice.call(arguments, 1))); }
function In(a) { return E("input", a); }
function Tx(a) { return E("textarea", a); }

function Av(name, sz, online, photo) {
  name = name||""; sz = sz||40;
  const w = D({style:{position:"relative",flexShrink:0}});
  if (photo) w.appendChild(E("img",{src:photo,style:{width:sz+"px",height:sz+"px",borderRadius:"50%",objectFit:"cover",display:"block"}}));

}

const isAdmin = () => S.user && S.user.email === ADMIN_EMAIL;

function saveUser(u, name) {
  return db.collection("users").doc(u.uid).set({
    uid:u.uid, name:name||u.displayName||u.email,
    email:u.email, photoURL:u.photoURL||null,
    status:"online", lastSeen:firebase.firestore.FieldValue.serverTimestamp(),
    createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    gps:S.gps, isAdmin:u.email===ADMIN_EMAIL
  }, {merge:true});
}

function goOnline() {
  if (!S.user) return;
  db.collection("users").doc(S.user.uid).update({
    status:"online", lastSeen:firebase.firestore.FieldValue.serverTimestamp(),
    ...(S.gps?{gps:S.gps}:{})
  }).catch(function(){});
}

  if (!S.user) return;
  db.collection("users").doc(S.user.uid).update({
    status:"offline", lastSeen:firebase.firestore.FieldValue.serverTimestamp()

}

function subChats(uid) {
  if (S.unsubChats) S.unsubChats();
  S.unsubChats = db.collection("chats").where("members","array-contains",uid)
    .onSnapshot(function(snap) {
      S.chats = snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      render();
    });
}

function subContacts(uid) {
  if (S.unsubContacts) S.unsubContacts();
  S.unsubContacts = db.collection("users").where("uid","!=",uid)
    .onSnapshot(function(snap) {
      S.contacts = snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      render();
    });
}

function subMsgs(chatId) {
  if (S.unsubMsg) S.unsubMsg();
  S.messages = [];
  if (!chatId) return;
  S.unsubMsg = db.collection("chats").doc(chatId).collection("messages")
    .orderBy("createdAt","asc").limit(300)
    .onSnapshot(function(snap) {
      S.messages = snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      render();
      setTimeout(function(){var el=document.getElementById("msgEnd");if(el)el.scrollIntoView({behavior:"smooth"});},60);
    });
}

function getOrCreate(uid1, uid2) {
  const cid = [uid1,uid2].sort().join("_");
  return db.collection("chats").doc(cid).get().then(function(snap) {
    if (!snap.exists) {
      return db.collection("chats").doc(cid).set({
        members:[uid1,uid2], isGroup:false,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        lastMessage:"", lastMessageTime:firebase.firestore.FieldValue.serverTimestamp(),
        pinnedBy:[], mutedBy:[]
      });
    }
  }).then(function(){ return cid; });
}

function sendMsg(payload) {
  if (!S.activeChat) return Promise.resolve();
  const cid = S.activeChat.id, u = S.user;
  const data = Object.assign({
    senderId:u.uid, senderName:u.displayName||u.email,
    createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    readBy:[u.uid], reactions:{}, deleted:false
  }, payload);
  if (S.replyTo) data.replyTo = {id:S.replyTo.id, text:S.replyTo.text||"", senderName:S.replyTo.senderName};
  return db.collection("chats").doc(cid).collection("messages").add(data).then(function() {
    const preview = payload.text || (payload.gif?"🎞️ GIF":payload.file?"📎 "+payload.file.name:payload.location?"📍 Location":"");
    S.replyTo = null;
    return db.collection("chats").doc(cid).update({
      lastMessage:preview,
      lastMessageTime:firebase.firestore.FieldValue.serverTimestamp(),
      lastSenderId:u.uid
    });
  });
}

function uploadFile(file, onP) {
  const path = "chats/"+S.activeChat.id+"/"+Date.now()+"."+file.name.split(".").pop();
  const ref = storage.ref(path);
  return new Promise(function(res, rej) {
    const task = ref.put(file, {contentType:file.type});
    task.on("state_changed", function(s){onP(Math.round(s.bytesTransferred/s.totalBytes*100));}, rej,
      function(){ref.getDownloadURL().then(function(url){res({url:url,name:file.name,size:file.size,type:file.type});});});
  });
}

function uploadAvatar(uid, file) {
  const ref = storage.ref("avatars/"+uid+"."+file.name.split(".").pop());
  return new Promise(function(res, rej) {
    const task = ref.put(file, {contentType:file.type});
    task.on("state_changed", null, rej, function(){ref.getDownloadURL().then(res);});
  });
}

function reactMsg(cid, msgId, emoji) {
  const ref = db.collection("chats").doc(cid).collection("messages").doc(msgId);
  return ref.get().then(function(snap) {
    const rx = (snap.data()||{}).reactions || {};
    const uid = S.user.uid;
    if (rx[emoji] && rx[emoji].indexOf(uid) >= 0) {
      return ref.update({["reactions."+emoji]: firebase.firestore.FieldValue.arrayRemove(uid)});
    } else {
      return ref.update({["reactions."+emoji]: firebase.firestore.FieldValue.arrayUnion(uid)});
    }
  });
}

function delMsg(cid, msgId, all) {
  const ref = db.collection("chats").doc(cid).collection("messages").doc(msgId);
  return all
    ? ref.update({deleted:true, text:"", file:null, gif:null})
    : ref.update({deletedFor: firebase.firestore.FieldValue.arrayUnion(S.user.uid)});
}

function subStatuses() {
  const cutoff = new Date(Date.now()-864e5);
  db.collection("statuses").where("expiresAt",">",cutoff)
    .onSnapshot(function(snap) {
      S.statuses = snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      render();
    });
}

function postStatus(text) {
  return db.collection("statuses").add({
    uid:S.user.uid, userName:S.user.displayName||S.user.email,
    photoURL:S.user.photoURL||null, text:text, imageUrl:null,
    createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    expiresAt:new Date(Date.now()+864e5), views:[]
  });

/* ── WebRTC ── */
function startCall(chat, video) {
  const oUid = chat.members && chat.members.find(function(m){return m!==S.user.uid;});
  const other = S.contacts.find(function(c){return c.uid===oUid;});
  S.call = {remoteUid:oUid, remoteName:(other&&(other.name||other.email))||"User", remotePhoto:other&&other.photoURL, video:video, status:"calling", duration:0};
  render();
  navigator.mediaDevices.getUserMedia({audio:true,video:video}).then(function(stream) {
    localStr = stream;
    setTimeout(function(){var lv=document.getElementById("lv");if(lv)lv.srcObject=stream;},100);
    pc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
    stream.getTracks().forEach(function(t){pc.addTrack(t,stream);});
    pc.ontrack = function(e) {
      setTimeout(function(){var rv=document.getElementById("rv");if(rv)rv.srcObject=e.streams[0];},100);
      S.call.status="connected"; render();
      callTimer = setInterval(function(){S.call.duration++;render();},1000);
    };
    const callId = [S.user.uid,oUid].sort().join("_c_");
    pc.onicecandidate = function(e) {
      if (e.candidate) {
        db.collection("calls").doc(callId).update({callerCandidates:firebase.firestore.FieldValue.arrayUnion(e.candidate.toJSON())}).catch(function(){});
      }
    };
    pc.createOffer().then(function(offer) {
      return pc.setLocalDescription(offer).then(function() {
        return db.collection("calls").doc(callId).set({
          offer:{type:offer.type,sdp:offer.sdp}, caller:S.user.uid, callee:oUid,
          video:video, status:"ringing", callerCandidates:[], calleeCandidates:[],
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
      });
    }).then(function() {
      callUnsub = db.collection("calls").doc(callId).onSnapshot(function(snap) {
        const data = snap.data(); if (!data||!pc) return;
        if (data.answer && pc.signalingState==="have-local-offer") {
          pc.setRemoteDescription(new RTCSessionDescription(data.answer)).catch(function(){});
        }
        if (data.calleeCandidates && data.calleeCandidates.length && pc.remoteDescription) {
          data.calleeCandidates.forEach(function(c){pc.addIceCandidate(new RTCIceCandidate(c)).catch(function(){});});
        }
        if (data.status==="ended") endCall(true);
      });
    });
  }).catch(function(){S.call.status="failed";render();});
}

function endCall(remote) {
  clearInterval(callTimer); callTimer=null;
  if (!remote && S.call) {
    db.collection("calls").doc([S.user.uid,S.call.remoteUid].sort().join("_c_")).update({status:"ended"}).catch(function(){});
  }
  if (callUnsub){callUnsub();callUnsub=null;}
  if (localStr) localStr.getTracks().forEach(function(t){t.stop();}); localStr=null;
  if (pc) pc.close(); pc=null;
  S.call=null; render();
}

/* ── Voice recording ── */
function startRec() {
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream) {
    S.mediaRec = new MediaRecorder(stream); S.recChunks = [];
    S.mediaRec.ondataavailable = function(e){S.recChunks.push(e.data);};
    S.mediaRec.onstop = function() {
      const blob = new Blob(S.recChunks,{type:"audio/webm"});
      const file = new File([blob],"voice-"+Date.now()+".webm",{type:"audio/webm"});
      stream.getTracks().forEach(function(t){t.stop();});
      S.recording=false; S.recTime=0; clearInterval(S.recInt); S.uploadPct=0; render();
      uploadFile(file,function(p){S.uploadPct=p;render();}).then(function(fd){return sendMsg({file:fd});})
        .catch(function(e){console.error(e);}).then(function(){S.uploadPct=null;render();});
    };
    S.mediaRec.start(); S.recording=true;
    S.recInt = setInterval(function(){S.recTime++;render();},1000);
    render();
  }).catch(function(){alert("Microphone access denied.");});
}
function stopRec(){if(S.mediaRec)S.mediaRec.stop();}
function cancelRec(){
  if(S.mediaRec&&S.mediaRec.stream)S.mediaRec.stream.getTracks().forEach(function(t){t.stop();});
  S.mediaRec=null;S.recording=false;S.recTime=0;clearInterval(S.recInt);render();
}

    rp.append(D({},
      D({style:{color:C.accent,fontSize:"11px",fontWeight:700}}, S.replyTo.senderName),
      D({style:{color:C.muted,fontSize:"13px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"260px"}}, S.replyTo.text||"📎 Attachment")),
      Bt({style:{background:"none",border:"none",color:C.muted,fontSize:"18px",cursor:"pointer"},onClick:function(){S.replyTo=null;render();}}, "✕"));
    win.appendChild(rp);
  }

  // Recording bar
  if (S.recording) {
    const rb = D({style:{margin:"0 14px 4px",padding:"10px 16px",background:C.card,borderRadius:"12px",display:"flex",alignItems:"center",gap:"12px",flexShrink:0}});
    rb.append(Sp({style:{color:C.red,fontSize:"20px"}}, "🔴"),
      Sp({style:{color:C.text,fontWeight:600,flex:1}}, "Recording… "+String(Math.floor(S.recTime/60)).padStart(2,"0")+":"+String(S.recTime%60).padStart(2,"0")),
      Bt({style:{padding:"7px 18px",borderRadius:"8px",border:"none",background:C.accent,color:"#fff",fontWeight:700,cursor:"pointer"},onClick:stopRec}, "➤ Send"),
      Bt({style:{padding:"7px 14px",borderRadius:"8px",border:"none",background:C.red,color:"#fff",cursor:"pointer"},onClick:cancelRec}, "✕"));
    win.appendChild(rb);
  }

  // Emoji picker
  if (S.showEmoji) {
    const ep = D({style:{margin:"0 14px 4px",background:C.card,borderRadius:"14px",border:"1px solid "+C.border,overflow:"hidden",flexShrink:0,maxHeight:"260px",display:"flex",flexDirection:"column"}});
    const catTabs = D({style:{display:"flex",borderBottom:"1px solid "+C.border,overflowX:"auto",flexShrink:0}});
    const emojiContent = D({style:{flex:1,overflowY:"auto",padding:"8px",display:"flex",flexWrap:"wrap",gap:"2px"}});
    function showCat(i) {
      catTabs.querySelectorAll("button").forEach(function(b,j){b.style.borderBottom=j===i?"2px solid "+C.accent:"2px solid transparent";b.style.color=j===i?C.accent:C.muted;});
      emojiContent.innerHTML="";
      ECAT[i].e.forEach(function(em) {
        const sp = Sp({style:{fontSize:"22px",cursor:"pointer",padding:"4px",borderRadius:"6px",lineHeight:1,userSelect:"none"},
          onClick:function(){const ti=document.getElementById("txti");if(ti){ti.value+=em;ti.dispatchEvent(new Event("input"));}}}, em);
        sp.addEventListener("mouseenter",function(){sp.style.background=C.border;});
        sp.addEventListener("mouseleave",function(){sp.style.background="transparent";});
        emojiContent.appendChild(sp);
      });
    }
    ECAT.forEach(function(cat,i){
      const b = Bt({style:{background:"none",border:"none",borderBottom:"2px solid transparent",padding:"8px 10px",fontSize:"18px",cursor:"pointer",flexShrink:0,color:C.muted},onClick:function(){showCat(i);}}, cat.ic);
      catTabs.appendChild(b);
    });
    ep.append(catTabs,emojiContent); showCat(0);
    win.appendChild(ep);
  }

  // GIF picker
  if (S.showGif) {
    const gpEl = D({style:{margin:"0 14px 4px",background:C.card,borderRadius:"14px",border:"1px solid "+C.border,overflow:"hidden",flexShrink:0,maxHeight:"260px",display:"flex",flexDirection:"column"}});
    const gBar = D({style:{display:"flex",gap:"8px",padding:"8px",flexShrink:0,borderBottom:"1px solid "+C.border}});
    const gI = In({placeholder:"Search GIFs…",style:{flex:1,padding:"7px 12px",borderRadius:"20px",border:"1px solid "+C.border,background:C.panel,color:C.text,fontSize:"13px",outline:"none"}});
    var deb; gI.addEventListener("input",function(e){clearTimeout(deb);deb=setTimeout(function(){loadGifs(e.target.value);},450);});
    gBar.append(Sp({style:{fontSize:"18px",alignSelf:"center",flexShrink:0}}, "🎞️"), gI);
    const gGrid = D({style:{flex:1,overflowY:"auto",padding:"8px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"6px"}});
    function refreshGif() {
      gGrid.innerHTML="";
      if (S.gifBusy){gGrid.appendChild(D({style:{gridColumn:"1/-1",textAlign:"center",padding:"20px",color:C.muted}}, "⏳ Loading…"));return;}
      if (!S.gifRes.length){gGrid.appendChild(D({style:{gridColumn:"1/-1",textAlign:"center",padding:"20px",color:C.muted}}, "Search for GIFs above 👆"));return;}
      S.gifRes.forEach(function(gif) {
        const img = E("img",{src:gif.thumb,alt:"gif",style:{width:"100%",height:"75px",objectFit:"cover",borderRadius:"8px",cursor:"pointer",border:"2px solid transparent",transition:"border .15s"}});
        img.addEventListener("mouseenter",function(){img.style.borderColor=C.accent;});
        img.addEventListener("mouseleave",function(){img.style.borderColor="transparent";});
        img.addEventListener("click",function(){S.showGif=false;sendMsg({gif:gif.url,text:""}).then(function(){render();});});
        gGrid.appendChild(img);
      });
    }
    gpEl.append(gBar,gGrid); win.appendChild(gpEl);
    if (!S.gifRes.length&&!S.gifBusy) loadGifs(""); else refreshGif();
  }

  // Attach menu
  if (S.showAttach) {
    const am = D({style:{margin:"0 14px 6px",padding:"14px 18px",background:C.card,borderRadius:"14px",display:"flex",gap:"20px",flexWrap:"wrap",flexShrink:0}});
    const fi = In({type:"file",style:{display:"none"}});
    fi.addEventListener("change",function(e) {
      const f = e.target.files[0]; if(!f) return;
      S.showAttach=false; S.uploadPct=0; render();
      uploadFile(f,function(p){S.uploadPct=p;render();}).then(function(fd){return sendMsg({file:fd});})
        .catch(function(err){console.error(err);}).then(function(){S.uploadPct=null;render();});
    });
    am.appendChild(fi);
    function mkA(ic,lbl,fn){
      const a = D({style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",cursor:"pointer"},onClick:fn});
      a.append(D({style:{width:"52px",height:"52px",borderRadius:"50%",background:C.panel,border:"1px solid "+C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px"}}, ic),
        Sp({style:{color:C.muted,fontSize:"11px",fontWeight:600}}, lbl));
      return a;
    }
    am.append(
      mkA("🖼️","Photo/Video",function(){fi.accept="image/*,video/*";fi.click();}),
      mkA("📄","Document",function(){fi.accept="*/*";fi.click();}),
      mkA("📍","Location",function(){navigator.geolocation.getCurrentPosition(function(p){sendMsg({location:{lat:p.coords.latitude,lng:p.coords.longitude}});});S.showAttach=false;render();}),
      mkA("📷","Camera",function(){fi.accept="image/*";fi.capture="environment";fi.click();})
    );
    win.appendChild(am);
  }

  // Input bar
  const bar = D({style:{padding:"10px 14px",background:C.panel,borderTop:"1px solid "+C.border,display:"flex",alignItems:"center",gap:"6px",flexShrink:0}});
  bar.append(
    Bt({style:{background:"none",border:"none",fontSize:"22px",padding:"6px",cursor:"pointer",flexShrink:0,color:S.showEmoji?C.accent:C.muted,borderRadius:"50%"},
      onClick:function(){S.showEmoji=!S.showEmoji;S.showGif=false;S.showAttach=false;render();}}, "😊"),
    Bt({style:{background:S.showGif?C.accent+"20":"none",border:S.showGif?"1px solid "+C.accent:"1px solid "+C.border,borderRadius:"8px",color:S.showGif?C.accent:C.muted,fontSize:"12px",fontWeight:700,padding:"5px 8px",cursor:"pointer",flexShrink:0},
      onClick:function(){S.showGif=!S.showGif;S.showEmoji=false;S.showAttach=false;render();}}, "GIF"),
    Bt({style:{background:"none",border:"none",fontSize:"22px",padding:"6px",cursor:"pointer",flexShrink:0,color:S.showAttach?C.accent:C.muted,borderRadius:"50%"},
      onClick:function(){S.showAttach=!S.showAttach;S.showEmoji=false;S.showGif=false;render();}}, "📎")
  );
  const iWrap = D({style:{flex:1,background:C.card,borderRadius:"24px",padding:"10px 16px",display:"flex",alignItems:"center"}});
  const txti = In({id:"txti",placeholder:"Type a message",style:{background:"none",border:"none",color:C.text,fontSize:"14px",width:"100%",outline:"none"}});
  const sendB = Bt({style:{width:"46px",height:"46px",borderRadius:"50%",border:"none",background:C.card,fontSize:"20px",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .2s",flexShrink:0,cursor:"pointer"},
    onClick:function(){
      const v = txti.value.trim();
      if (v){txti.value="";sendB.style.background=C.card;sendB.textContent="🎙";sendMsg({text:v}).then(function(){render();});}
      else if (!S.recording) startRec();
    }}, "🎙");
  txti.addEventListener("keydown",function(e){
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();const v=txti.value.trim();if(v){txti.value="";sendB.style.background=C.card;sendB.textContent="🎙";sendMsg({text:v}).then(function(){render();});}}
  });
  txti.addEventListener("input",function(){const v=txti.value.trim();sendB.style.background=v?C.accent:C.card;sendB.textContent=v?"➤":"🎙";});
  iWrap.appendChild(txti); bar.append(iWrap,sendB);
  win.appendChild(bar);
  return win;
}

/* ═══════════ BUBBLE ═══════════ */
const RXS = ["👍","❤️","😂","😮","😢","🙏","🔥","🎉","😍","👏"];
function buildBubble(msg, prev, isGroup, uid, cid) {
  const isMe = msg.senderId===uid, ps = prev&&prev.senderId===msg.senderId;
  if (msg.deleted) return D({style:{display:"flex",justifyContent:isMe?"flex-end":"flex-start",marginTop:"4px"}},
    D({style:{padding:"6px 14px",borderRadius:"12px",border:"1px solid "+C.border,color:C.muted,fontSize:"13px",fontStyle:"italic"}}, "🚫 This message was deleted"));
  const wrap = D({style:{position:"relative",display:"flex",flexDirection:"column",alignItems:isMe?"flex-end":"flex-start",marginTop:ps?"2px":"10px"}});
  if (msg.replyTo) {
    const rp = D({style:{maxWidth:"65%",marginBottom:"3px",padding:"6px 10px",borderRadius:"8px",background:C.card,borderLeft:"3px solid "+C.accent,fontSize:"12px",color:C.muted}});
    rp.append(D({style:{color:C.accent,fontWeight:600,marginBottom:"1px"}}, msg.replyTo.senderName), D({}, msg.replyTo.text||"📎"));
    wrap.appendChild(rp);
  }
  const row = D({style:{display:"flex",alignItems:"flex-end",gap:"6px",flexDirection:isMe?"row-reverse":"row"}});
  if (isGroup&&!isMe&&!ps) row.appendChild(Av(msg.senderName||"?",26));
  else if (isGroup&&!isMe&&ps) row.appendChild(D({style:{width:"26px"}}));
  const bub = D({style:{maxWidth:"68%",padding:"8px 12px",borderRadius:isMe?"18px 18px 4px 18px":"18px 18px 18px 4px",background:isMe?C.out:C.inn,border:"1px solid "+(isMe?"#005c4b80":C.border),cursor:"context-menu",position:"relative"}});
  if (isGroup&&!isMe) bub.appendChild(D({style:{color:C.accent,fontSize:"11px",fontWeight:700,marginBottom:"3px"}}, msg.senderName||""));
  if (msg.gif) bub.appendChild(E("img",{src:msg.gif,alt:"GIF",style:{maxWidth:"100%",maxHeight:"200px",borderRadius:"8px",display:"block",marginBottom:msg.text?"6px":"0"}}));
  const isImg=msg.file&&msg.file.type&&msg.file.type.startsWith("image/");
  const isVid=msg.file&&msg.file.type&&msg.file.type.startsWith("video/");
  const isAud=msg.file&&msg.file.type&&msg.file.type.startsWith("audio/");
  if (isImg) {
    const img = E("img",{src:msg.file.url,style:{maxWidth:"100%",maxHeight:"260px",borderRadius:"8px",display:"block",marginBottom:msg.text?"6px":"0",cursor:"zoom-in",objectFit:"cover"}});
    img.addEventListener("click",function(){const ov=D({style:{position:"fixed",inset:0,background:"#000e",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}},E("img",{src:msg.file.url,style:{maxWidth:"95vw",maxHeight:"95vh",objectFit:"contain"}}));ov.addEventListener("click",function(){ov.remove();});document.body.appendChild(ov);});
    bub.appendChild(img);
  }
  if (isVid) bub.appendChild(E("video",{controls:"",src:msg.file.url,style:{maxWidth:"100%",maxHeight:"240px",borderRadius:"8px",display:"block",marginBottom:msg.text?"6px":"0"}}));
  if (isAud) {
    const ar = D({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:msg.text?"6px":"0",minWidth:"180px"}});
    ar.append(Sp({style:{fontSize:"22px"}}, "🎙"), E("audio",{controls:"",src:msg.file.url,style:{flex:1,height:"32px"}}));
    bub.appendChild(ar);
  }
  if (msg.file&&!isImg&&!isVid&&!isAud) {
    const fa = E("a",{href:msg.file.url,target:"_blank",rel:"noreferrer",style:{display:"flex",alignItems:"center",gap:"10px",textDecoration:"none",background:C.card,borderRadius:"8px",padding:"8px 10px",marginBottom:msg.text?"6px":"0"}});
    fa.append(Sp({style:{fontSize:"26px"}}, fIcon(msg.file.type)), D({}, D({style:{color:C.text,fontSize:"13px",fontWeight:600,wordBreak:"break-all"}}, msg.file.name), D({style:{color:C.muted,fontSize:"11px"}}, fmtB(msg.file.size))));
    bub.appendChild(fa);
  }
  if (msg.location&&msg.location.lat) {
    const la = E("a",{href:"https://maps.google.com/?q="+msg.location.lat+","+msg.location.lng,target:"_blank",rel:"noreferrer",style:{display:"flex",alignItems:"center",gap:"8px",textDecoration:"none",background:C.card,borderRadius:"8px",padding:"8px 12px",marginBottom:msg.text?"6px":"0"}});
    la.append(Sp({style:{fontSize:"24px"}}, "📍"), D({}, D({style:{color:C.text,fontSize:"13px",fontWeight:600}}, "Shared Location"), D({style:{color:C.muted,fontSize:"11px"}}, msg.location.lat.toFixed(5)+", "+msg.location.lng.toFixed(5)), D({style:{color:C.accent,fontSize:"11px"}}, "Tap to open in Maps")));
    bub.appendChild(la);
  }
  if (msg.text) bub.appendChild(D({style:{color:C.text,fontSize:"14px",lineHeight:"1.55",wordBreak:"break-word"}}, msg.text));
  const tr = D({style:{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:"3px",marginTop:"3px",color:isMe?"#a7f3d0":C.muted,fontSize:"10px"}});
  tr.append(fmtT(msg.createdAt)); if(isMe)tr.appendChild(Sp({}, msg.readBy&&msg.readBy.length>1?"✓✓":"✓"));
  bub.appendChild(tr);
  var pt=null;
  function openCtx(){ctxMenu(msg,bub,isMe,cid);}
  bub.addEventListener("mousedown",function(){pt=setTimeout(openCtx,500);});
  bub.addEventListener("mouseup",function(){clearTimeout(pt);});
  bub.addEventListener("touchstart",function(){pt=setTimeout(openCtx,500);},{passive:true});
  bub.addEventListener("touchend",function(){clearTimeout(pt);});
  bub.addEventListener("contextmenu",function(e){e.preventDefault();openCtx();});
  row.appendChild(bub);
  const qr = Bt({style:{background:"none",border:"none",color:C.muted,fontSize:"14px",opacity:.5,padding:"2px",flexShrink:0,cursor:"pointer"},onClick:function(){rxPicker(msg,wrap,isMe,cid);}}, "😊");
  row.appendChild(qr); wrap.appendChild(row);
  const rxs=msg.reactions||{}, rxE=Object.entries(rxs).filter(function(e){return e[1]&&e[1].length>0;});
  if (rxE.length) {
    const rxRow = D({style:{display:"flex",gap:"4px",marginTop:"3px",flexWrap:"wrap",justifyContent:isMe?"flex-end":"flex-start"}});
    rxE.forEach(function(pair) {
      const em=pair[0], u=pair[1];
      const rb = D({style:{background:C.card,border:"1px solid "+C.border,borderRadius:"20px",padding:"2px 8px",fontSize:"12px",cursor:"pointer",display:"flex",alignItems:"center",gap:"3px"},
        onClick:function(){reactMsg(cid,msg.id,em);}});
      rb.append(em, Sp({style:{color:C.muted}}, u.length));
      rxRow.appendChild(rb);
    });
    wrap.appendChild(rxRow);
  }
  return wrap;
}

function rxPicker(msg, wrap, isMe, cid) {
  document.querySelectorAll(".rxp").forEach(function(e){e.remove();});
  const p = D({class:"rxp",style:{position:"absolute",zIndex:50,bottom:"105%",right:isMe?"0":"auto",left:isMe?"auto":"0",background:C.panel,border:"1px solid "+C.border,borderRadius:"30px",padding:"8px 12px",display:"flex",gap:"8px",boxShadow:"0 4px 24px rgba(0,0,0,.5)"}});
  RXS.forEach(function(em){p.appendChild(Sp({style:{fontSize:"22px",cursor:"pointer",padding:"2px",borderRadius:"4px"},onClick:function(){reactMsg(cid,msg.id,em);p.remove();render();}},em));});
  p.appendChild(Sp({style:{color:C.muted,cursor:"pointer",fontSize:"16px",alignSelf:"center",paddingLeft:"4px"},onClick:function(){p.remove();}}, "✕"));
  wrap.style.position="relative"; wrap.appendChild(p);
  setTimeout(function(){document.addEventListener("click",function(){p.remove();},{once:true});},50);
}

function ctxMenu(msg, bub, isMe, cid) {
  document.querySelectorAll(".ctx").forEach(function(e){e.remove();});
  const menu = D({class:"ctx",style:{position:"fixed",zIndex:300,background:C.panel,border:"1px solid "+C.border,borderRadius:"14px",overflow:"hidden",boxShadow:"0 6px 32px rgba(0,0,0,.65)",minWidth:"200px"}});
  const r = bub.getBoundingClientRect();
  menu.style.top = Math.min(r.bottom+6, window.innerHeight-260)+"px";
  menu.style[isMe?"right":"left"] = isMe?(window.innerWidth-r.right+4)+"px":(r.left+4)+"px";
  var items = [
    ["↩️  Reply",function(){S.replyTo=msg;render();}],
    ["😊  React",function(){rxPicker(msg,bub.parentElement&&bub.parentElement.parentElement,isMe,cid);}],
    ["📋  Copy Text",function(){navigator.clipboard&&navigator.clipboard.writeText(msg.text||"");}],
    ["⭐  Star",function(){}],
    ["🔁  Forward",function(){}],
  ];
  if (isMe) items = items.concat([["🗑️  Delete for me",function(){delMsg(cid,msg.id,false).then(function(){render();});}],["🗑️  Delete for everyone",function(){delMsg(cid,msg.id,true).then(function(){render();});}]]);
  items.forEach(function(item) {
    const it = D({style:{padding:"12px 18px",color:item[0].includes("Delete")?C.red:C.text,fontSize:"14px",cursor:"pointer",borderBottom:"1px solid "+C.border+"20"},onClick:function(){item[1]();menu.remove();}}, item[0]);
    it.addEventListener("mouseenter",function(){it.style.background=C.border+"40";});
    it.addEventListener("mouseleave",function(){it.style.background="transparent";});
    menu.appendChild(it);
  });
  menu.appendChild(D({style:{padding:"10px 18px",color:C.muted,fontSize:"13px",cursor:"pointer"},onClick:function(){menu.remove();}}, "Cancel"));
  document.body.appendChild(menu);
  setTimeout(function(){document.addEventListener("click",function(){menu.remove();},{once:true});},50);
}

/* ═══════════ MAIN RENDER ═══════════ */
function render() {
  A.innerHTML = "";
  if (!S.gps) { A.appendChild(screenGPS()); return; }
  if (!S.user) { A.appendChild(screenLogin()); return; }
  if (S.call)  { A.appendChild(screenCall()); return; }
  const layout = D({style:{height:"100vh",display:"flex",overflow:"hidden"}});
  const showSide = !S.mobile || !S.activeChat;
  const showChat = !S.mobile || !!S.activeChat;
  if (showSide) {
    const sw = D({style:{width:S.mobile?"100%":"360px",flexShrink:0,height:"100%"}});
    sw.appendChild(buildSidebar()); layout.appendChild(sw);
  }
  if (showChat) layout.appendChild(buildChat());
  A.appendChild(layout);
}

/* ═══════════ BOOT ═══════════ */
render();

auth.onAuthStateChanged(function(u) {
  if (u) {
    S.user = u;
    subChats(u.uid); subContacts(u.uid); subStatuses(); goOnline();
  } else {
    S.user = null; S.chats=[]; S.contacts=[]; S.messages=[]; S.activeChat=null;
  }
  render();
});

window.addEventListener("resize", function(){S.mobile=window.innerWidth<768;render();});
window.addEventListener("beforeunload", goOffline);
window.addEventListener("visibilitychange", function(){document.hidden?goOffline():goOnline();});

navigator.geolocation && navigator.geolocation.watchPosition(
  function(pos) {
    S.gps = {lat:pos.coords.latitude, lng:pos.coords.longitude};
    if (S.user) db.collection("users").doc(S.user.uid).update({gps:S.gps, lastSeen:firebase.firestore.FieldValue.serverTimestamp()}).catch(function(){});
    render();
  },
  null,
  {enableHighAccuracy:true, maximumAge:10000}
);

</script>
</body>
