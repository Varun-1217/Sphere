/* ── DOM helpers ── */
function h(tag,attrs,...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function")e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of kids)if(c!=null&&c!==false)e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  return e;
}
const D=(a,...c)=>h("div",a,...c);
const Sp=(a,...c)=>h("span",a,...c);
const Bt=(a,...c)=>h("button",a,...c);
const In=a=>h("input",a);
const Tx=a=>h("textarea",a);

function Av(name,size=40,online=false,photo=null){
  const w=D({style:{position:"relative",flexShrink:0}});
  if(photo)w.appendChild(h("img",{src:photo,style:{width:size+"px",height:size+"px",borderRadius:"50%",objectFit:"cover"}}));
  else w.appendChild(D({style:{width:size+"px",height:size+"px",borderRadius:"50%",background:aColor(name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:(size*.36)+"px",fontWeight:700,color:"#fff",userSelect:"none"}},ini(name)));
  if(online)w.appendChild(D({style:{position:"absolute",bottom:"1px",right:"1px",width:Math.max(8,size*.22)+"px",height:Math.max(8,size*.22)+"px",borderRadius:"50%",background:C.accent,border:"2px solid "+C.panel}}));
  return w;
}

// Privacy: contacts only visible to the pair involved
function subChats(uid){
  if(S.unsubChats)S.unsubChats();
  S.unsubChats=onSnapshot(query(collection(db,"chats"),where("members","array-contains",uid)),snap=>{
    S.chats=snap.docs.map(d=>({id:d.id,...d.data()}));render();
  });
}
// Only load users you have chatted with OR user searches by starting new chat
// For "new chat": we load all users but display is private — nobody sees your list
function subContacts(uid){
  if(S.unsubContacts)S.unsubContacts();
  // Each user only sees users relevant to their own chats (privacy)
  S.unsubContacts=onSnapshot(query(collection(db,"users"),where("uid","!=",uid)),snap=>{
    S.contacts=snap.docs.map(d=>({id:d.id,...d.data()}));render();
  });
}
function subMsgs(chatId){
  if(S.unsubMsg)S.unsubMsg();
  S.messages=[];if(!chatId)return;
  S.unsubMsg=onSnapshot(query(collection(db,"chats",chatId,"messages"),orderBy("createdAt","asc"),limit(300)),snap=>{
    S.messages=snap.docs.map(d=>({id:d.id,...d.data()}));render();
    setTimeout(()=>document.getElementById("msgEnd")?.scrollIntoView({behavior:"smooth"}),60);
  });
}
async function getOrCreate(uid1,uid2){
  const cid=[uid1,uid2].sort().join("_");
  const r=doc(db,"chats",cid);
  if(!(await getDoc(r)).exists())await setDoc(r,{
    members:[uid1,uid2],isGroup:false,
    createdAt:serverTimestamp(),lastMessage:"",
    lastMessageTime:serverTimestamp(),pinnedBy:[],mutedBy:[],
  });
  return cid;
}
async function sendMsg(payload){
  if(!S.activeChat)return;
  const cid=S.activeChat.id,u=S.user;
  await addDoc(collection(db,"chats",cid,"messages"),{
    senderId:u.uid,senderName:u.displayName||u.email,
    createdAt:serverTimestamp(),readBy:[u.uid],
    reactions:{},deleted:false,
    ...payload,
    ...(S.replyTo?{replyTo:{id:S.replyTo.id,text:S.replyTo.text||"",senderName:S.replyTo.senderName}}:{}),
  });
  const preview=payload.text||(payload.gif?"🎞️ GIF":payload.file?"📎 "+payload.file.name:payload.location?"📍 Location":"");
  await updateDoc(doc(db,"chats",cid),{lastMessage:preview,lastMessageTime:serverTimestamp(),lastSenderId:u.uid});
  S.replyTo=null;
}
async function uploadFile(file,onP){
  const cid=S.activeChat.id,ext=file.name.split(".").pop(),path="chats/"+cid+"/"+Date.now()+"."+ext;
  const r=sRef(storage,path);
  return new Promise((res,rej)=>{
    const t=uploadBytesResumable(r,file,{contentType:file.type});
    t.on("state_changed",snap=>onP(Math.round(snap.bytesTransferred/snap.totalBytes*100)),rej,
      async()=>{const url=await getDownloadURL(t.snapshot.ref);res({url,name:file.name,size:file.size,type:file.type});});
  });
}
async function uploadProfilePic(uid,file){
  const path="avatars/"+uid+"."+file.name.split(".").pop();
  const r=sRef(storage,path);
  return new Promise((res,rej)=>{
    const t=uploadBytesResumable(r,file,{contentType:file.type});
    t.on("state_changed",null,rej,async()=>{const url=await getDownloadURL(t.snapshot.ref);res(url);});
  });
}
async function reactMsg(msgId,emoji){
  const r=doc(db,"chats",S.activeChat.id,"messages",msgId),snap=await getDoc(r),uid=S.user.uid;
  const rxs=snap.data()?.reactions||{};
  rxs[emoji]?.includes(uid)?await updateDoc(r,{["reactions."+emoji]:arrayRemove(uid)}):await updateDoc(r,{["reactions."+emoji]:arrayUnion(uid)});
}
async function delMsg(msgId,all){
  const r=doc(db,"chats",S.activeChat.id,"messages",msgId);
  all?await updateDoc(r,{deleted:true,text:"",file:null,gif:null}):await updateDoc(r,{deletedFor:arrayUnion(S.user.uid)});
}

/* ── GIF search ── */
async function searchGifs(q){
  S.gifLoading=true;render();
  try{
    const url=q
      ?"https://tenor.googleapis.com/v2/search?q="+encodeURIComponent(q)+"&key="+TENOR_KEY+"&limit=24&media_filter=gif"
      :"https://tenor.googleapis.com/v2/featured?key="+TENOR_KEY+"&limit=24&media_filter=gif";
    const r=await fetch(url);
    const data=await r.json();
    S.gifResults=(data.results||[]).map(g=>({url:g.media_formats?.gif?.url||g.media_formats?.tinygif?.url,preview:g.media_formats?.tinygif?.url||g.media_formats?.gif?.url,title:g.title}));
  }catch(e){S.gifResults=[];}
  S.gifLoading=false;render();
}

/* ── WebRTC ── */
let pc=null,localStr=null,callUnsub=null,callTimer=null;
async function startCall(chat,video){
  const oUid=chat.members?.find(m=>m!==S.user.uid);
  const other=S.contacts.find(c=>c.uid===oUid);
  S.call={remoteUid:oUid,remoteName:other?.name||other?.email||"User",remotePhoto:other?.photoURL,video,status:"calling",duration:0};
  render();
  try{
    localStr=await navigator.mediaDevices.getUserMedia({audio:true,video});
    setTimeout(()=>{const lv=document.getElementById("lv");if(lv)lv.srcObject=localStr;},100);
    pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
    localStr.getTracks().forEach(t=>pc.addTrack(t,localStr));
    pc.ontrack=e=>{setTimeout(()=>{const rv=document.getElementById("rv");if(rv)rv.srcObject=e.streams[0];},100);S.call.status="connected";render();callTimer=setInterval(()=>{S.call.duration++;render();},1000);};
    const callId=[S.user.uid,oUid].sort().join("_call_");
    pc.onicecandidate=async e=>{if(e.candidate){try{await updateDoc(doc(db,"calls",callId),{callerCandidates:arrayUnion(e.candidate.toJSON())});}catch(_){}}};
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    await setDoc(doc(db,"calls",callId),{offer:{type:offer.type,sdp:offer.sdp},caller:S.user.uid,callee:oUid,video,status:"ringing",callerCandidates:[],calleeCandidates:[],createdAt:serverTimestamp()});
    callUnsub=onSnapshot(doc(db,"calls",callId),async snap=>{
      const data=snap.data();if(!data||!pc)return;
      if(data.answer&&pc.signalingState==="have-local-offer")await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      if(data.calleeCandidates?.length&&pc.remoteDescription)for(const c of data.calleeCandidates){try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(_){}}
      if(data.status==="ended")endCall(true);
    });
  }catch(e){S.call.status="failed";render();}
}
async function endCall(remote=false){
  clearInterval(callTimer);callTimer=null;
  if(!remote&&S.call){try{const cid=[S.user.uid,S.call.remoteUid].sort().join("_call_");await updateDoc(doc(db,"calls",cid),{status:"ended"});}catch(_){}}
  if(callUnsub){callUnsub();callUnsub=null;}
  localStr?.getTracks().forEach(t=>t.stop());localStr=null;pc?.close();pc=null;S.call=null;render();
}

/* ── Voice recording ── */
async function startRec(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    S.mediaRec=new MediaRecorder(stream);S.recChunks=[];
    S.mediaRec.ondataavailable=e=>S.recChunks.push(e.data);
    S.mediaRec.onstop=async()=>{
      const blob=new Blob(S.recChunks,{type:"audio/webm"}),file=new File([blob],"voice-"+Date.now()+".webm",{type:"audio/webm"});
      stream.getTracks().forEach(t=>t.stop());
      S.recording=false;S.recTime=0;clearInterval(S.recInt);S.uploadPct=0;render();
      try{const fd=await uploadFile(file,p=>{S.uploadPct=p;render();});await sendMsg({file:fd});}catch(e){console.error(e);}
      S.uploadPct=null;render();
    };
    S.mediaRec.start();S.recording=true;S.recInt=setInterval(()=>{S.recTime++;render();},1000);render();
  }catch(e){alert("Mic access denied");}
}
function stopRec(){S.mediaRec?.stop();}
function cancelRec(){S.mediaRec?.stream?.getTracks().forEach(t=>t.stop());S.mediaRec=null;S.recording=false;S.recTime=0;clearInterval(S.recInt);render();}

      D({style:{padding:"16px",marginTop:"auto"}},Bt({style:{width:"100%",padding:"12px",borderRadius:"10px",border:"none",background:"#ef444420",color:C.red,fontWeight:700}},chat.isGroup?"🚪 Leave Group":"🚫 Block Contact")),
    );
    ov2.appendChild(pane);win.appendChild(ov2);
  }
  return win;
}

/* ── Message bubble ── */
const RX_EMOJIS=["👍","❤️","😂","😮","😢","🙏","🔥","🎉"];
function buildBubble(msg,prev,isGroup,uid,chatId){
  const isMe=msg.senderId===uid,prevSame=prev?.senderId===msg.senderId;
  if(msg.deleted)return D({style:{display:"flex",justifyContent:isMe?"flex-end":"flex-start",marginTop:"4px"}},D({style:{padding:"6px 14px",borderRadius:"12px",border:"1px solid "+C.border,color:C.muted,fontSize:"13px",fontStyle:"italic"}},"🚫 This message was deleted"));
  const wrap=D({style:{position:"relative",display:"flex",flexDirection:"column",alignItems:isMe?"flex-end":"flex-start",marginTop:prevSame?"2px":"10px"}});
  if(msg.replyTo){const rp=D({style:{maxWidth:"65%",marginBottom:"3px",padding:"6px 10px",borderRadius:"8px",background:C.card,borderLeft:"3px solid "+C.accent,fontSize:"12px",color:C.muted}});rp.append(D({style:{color:C.accent,fontWeight:600,marginBottom:"1px"}},msg.replyTo.senderName),D({},msg.replyTo.text||"📎"));wrap.appendChild(rp);}
  const row=D({style:{display:"flex",alignItems:"flex-end",gap:"6px",flexDirection:isMe?"row-reverse":"row"}});
  if(isGroup&&!isMe&&!prevSame)row.appendChild(Av(msg.senderName||"?",26));
  else if(isGroup&&!isMe&&prevSame)row.appendChild(D({style:{width:"26px"}}));
  const bub=D({style:{maxWidth:"68%",padding:"8px 12px",borderRadius:isMe?"18px 18px 4px 18px":"18px 18px 18px 4px",background:isMe?C.out:C.inn,border:"1px solid "+(isMe?"#005c4b80":C.border),cursor:"context-menu",position:"relative"}});
  if(isGroup&&!isMe)bub.appendChild(D({style:{color:C.accent,fontSize:"11px",fontWeight:700,marginBottom:"3px"}},msg.senderName||""));
  // GIF
  if(msg.gif){
    const gimg=h("img",{src:msg.gif,alt:"GIF",style:{maxWidth:"100%",maxHeight:"200px",borderRadius:"8px",display:"block",marginBottom:msg.text?"6px":"0"}});
    bub.appendChild(gimg);
  }
  const isImg=msg.file?.type?.startsWith("image/"),isVid=msg.file?.type?.startsWith("video/"),isAud=msg.file?.type?.startsWith("audio/");
  if(isImg){
    const img=h("img",{src:msg.file.url,style:{maxWidth:"100%",maxHeight:"260px",borderRadius:"8px",display:"block",marginBottom:msg.text?"6px":"0",cursor:"zoom-in",objectFit:"cover"}});
    img.addEventListener("click",()=>{const ov=D({style:{position:"fixed",inset:0,background:"#000e",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}},h("img",{src:msg.file.url,style:{maxWidth:"95vw",maxHeight:"95vh",objectFit:"contain"}}));ov.addEventListener("click",()=>ov.remove());document.body.appendChild(ov);});
    bub.appendChild(img);
  }
  if(isVid)bub.appendChild(h("video",{controls:"",src:msg.file.url,style:{maxWidth:"100%",maxHeight:"240px",borderRadius:"8px",display:"block",marginBottom:msg.text?"6px":"0"}}));
  if(isAud){const ar=D({style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:msg.text?"6px":"0",minWidth:"180px"}});ar.append(Sp({style:{fontSize:"22px"}},"🎙"),h("audio",{controls:"",src:msg.file.url,style:{flex:1,height:"32px"}}));bub.appendChild(ar);}
  if(msg.file&&!isImg&&!isVid&&!isAud){const fa=h("a",{href:msg.file.url,target:"_blank",rel:"noreferrer",style:{display:"flex",alignItems:"center",gap:"10px",textDecoration:"none",background:C.card,borderRadius:"8px",padding:"8px 10px",marginBottom:msg.text?"6px":"0"}});fa.append(Sp({style:{fontSize:"26px"}},fIcon(msg.file.type)),D({},D({style:{color:C.text,fontSize:"13px",fontWeight:600,wordBreak:"break-all"}},msg.file.name),D({style:{color:C.muted,fontSize:"11px"}},fmtB(msg.file.size))));bub.appendChild(fa);}
  if(msg.location){const la=h("a",{href:"https://maps.google.com/?q="+msg.location.lat+","+msg.location.lng,target:"_blank",rel:"noreferrer",style:{display:"flex",alignItems:"center",gap:"8px",textDecoration:"none",background:C.card,borderRadius:"8px",padding:"8px 12px",marginBottom:msg.text?"6px":"0"}});la.append(Sp({style:{fontSize:"24px"}},"📍"),D({},D({style:{color:C.text,fontSize:"13px",fontWeight:600}},"Shared Location"),D({style:{color:C.muted,fontSize:"11px"}},msg.location.lat.toFixed(4)+", "+msg.location.lng.toFixed(4)),D({style:{color:C.accent,fontSize:"11px"}},"Tap to open Maps")));bub.appendChild(la);}
  if(msg.text)bub.appendChild(D({style:{color:C.text,fontSize:"14px",lineHeight:"1.55",wordBreak:"break-word"}},msg.text));
  const tr=D({style:{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:"4px",marginTop:"3px",color:isMe?"#a7f3d0":C.muted,fontSize:"10px"}});
  tr.append(fmtT(msg.createdAt));if(isMe)tr.appendChild(Sp({},msg.readBy?.length>1?"✓✓":"✓"));
  bub.appendChild(tr);
  let pt=null;
  bub.addEventListener("mousedown",()=>{pt=setTimeout(()=>ctxMenu(msg,bub,isMe),500);});
  bub.addEventListener("mouseup",()=>clearTimeout(pt));
  bub.addEventListener("touchstart",()=>{pt=setTimeout(()=>ctxMenu(msg,bub,isMe),500);},{passive:true});
  bub.addEventListener("touchend",()=>clearTimeout(pt));
  bub.addEventListener("contextmenu",e=>{e.preventDefault();ctxMenu(msg,bub,isMe);});
  row.appendChild(bub);
  const qr=Bt({style:{background:"none",border:"none",color:C.muted,fontSize:"13px",opacity:.5,padding:"2px",flexShrink:0},onClick:()=>rxPicker(msg,wrap,isMe)},"😊");
  row.appendChild(qr);wrap.appendChild(row);
  const rxs=msg.reactions||{},rxE=Object.entries(rxs).filter(([,u])=>u?.length>0);
  if(rxE.length){const rxRow=D({style:{display:"flex",gap:"4px",marginTop:"3px",flexWrap:"wrap",justifyContent:isMe?"flex-end":"flex-start"}});for(const[e,u]of rxE){const rb=D({style:{background:C.card,border:"1px solid "+C.border,borderRadius:"20px",padding:"2px 8px",fontSize:"12px",cursor:"pointer",display:"flex",alignItems:"center",gap:"3px"},onClick:()=>reactMsg(msg.id,e)});rb.append(e,Sp({style:{color:C.muted}},u.length));rxRow.appendChild(rb);}wrap.appendChild(rxRow);}
  return wrap;
}
function rxPicker(msg,wrap,isMe){
  document.querySelectorAll(".rxp").forEach(e=>e.remove());
  const p=D({class:"rxp",style:{position:"absolute",zIndex:50,bottom:"100%",[isMe?"right":"left"]:"0",background:C.panel,border:"1px solid "+C.border,borderRadius:"30px",padding:"8px 12px",display:"flex",gap:"10px",boxShadow:"0 4px 24px rgba(0,0,0,.5)"}});
  for(const e of RX_EMOJIS)p.appendChild(Sp({style:{fontSize:"24px",cursor:"pointer"},onClick:()=>{reactMsg(msg.id,e);p.remove();render();}},e));
  p.appendChild(Sp({style:{color:C.muted,cursor:"pointer",fontSize:"16px",alignSelf:"center"},onClick:()=>p.remove()},"✕"));
  wrap.style.position="relative";wrap.appendChild(p);
}
function ctxMenu(msg,bub,isMe){
  document.querySelectorAll(".ctx").forEach(e=>e.remove());
  const menu=D({class:"ctx",style:{position:"fixed",zIndex:200,background:C.panel,border:"1px solid "+C.border,borderRadius:"12px",overflow:"hidden",boxShadow:"0 4px 24px rgba(0,0,0,.6)",minWidth:"170px"}});
  const r=bub.getBoundingClientRect();
  menu.style.top=Math.min(r.bottom+4,window.innerHeight-240)+"px";
  menu.style[isMe?"right":"left"]=isMe?(window.innerWidth-r.right)+"px":r.left+"px";
  const items=[
    ["↩️ Reply",()=>{S.replyTo=msg;render();}],
    ["📋 Copy",()=>navigator.clipboard.writeText(msg.text||"")],
    ["⭐ Star",()=>{}],
    ...(isMe?[["🗑️ Delete for me",()=>delMsg(msg.id,false)],["🗑️ Delete for everyone",()=>delMsg(msg.id,true)]]:[[],[]].slice(0,0)),
  ];
  for(const[label,fn]of items){const item=D({style:{padding:"11px 16px",color:label.includes("Delete")?C.red:C.text,fontSize:"14px",cursor:"pointer",borderBottom:"1px solid "+C.border+"20"},onClick(){fn();menu.remove();}},label);menu.appendChild(item);}
  menu.appendChild(D({style:{padding:"9px 16px",color:C.muted,fontSize:"13px",cursor:"pointer"},onClick:()=>menu.remove()},"Cancel"));
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener("click",()=>menu.remove(),{once:true}),10);
}

/* ── Main render ── */
function render(){
  const root=document.getElementById("app");root.innerHTML="";
  if(S.loading){root.appendChild(D({style:{height:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.accent,fontSize:"48px"}},"💬"));return;}
  if(!S.gps){root.appendChild(screenGPS());return;}
  if(!S.user){root.appendChild(screenLogin());return;}
  if(S.call){root.appendChild(screenCall());return;}
  const layout=D({style:{height:"100vh",display:"flex",overflow:"hidden"}});
  const showSide=!S.mobile||!S.activeChat,showChat=!S.mobile||!!S.activeChat;
  if(showSide){const sw=D({style:{width:S.mobile?"100%":"360px",flexShrink:0,height:"100%"}});sw.appendChild(buildSidebar());layout.appendChild(sw);}
  if(showChat)layout.appendChild(buildChat());
  root.appendChild(layout);
}

/* ── Boot ── */
render();
onAuthStateChanged(auth,async u=>{
  S.loading=false;
  if(u){S.user=u;subChats(u.uid);subContacts(u.uid);subStatuses();}
  else{S.user=null;S.chats=[];S.contacts=[];S.messages=[];S.activeChat=null;}
  render();
});
window.addEventListener("resize",()=>{S.mobile=window.innerWidth<768;render();});
window.addEventListener("beforeunload",()=>{if(S.user)setOnline(S.user.uid,"offline");});
navigator.geolocation?.watchPosition(pos=>{if(!S.gps)return;S.gps={lat:pos.coords.latitude,lng:pos.coords.longitude};if(S.user)setOnline(S.user.uid,"online");render();},null,{enableHighAccuracy:true});
</script>
