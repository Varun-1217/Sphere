/* ── DOM helpers ── */
function h(t,a,...k){
  const e=document.createElement(t);
  for(const[p,v]of Object.entries(a||{})){
    if(p==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(p.startsWith("on")&&typeof v==="function")e.addEventListener(p.slice(2).toLowerCase(),v);
    else e.setAttribute(p,v);
  }
  for(const c of k)if(c!=null&&c!==false)e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  return e;
}
const D=(a,...c)=>h("div",a,...c);
const Sp=(a,...c)=>h("span",a,...c);
const Bt=(a,...c)=>h("button",a,...c);
const In=a=>h("input",a);
const Tx=a=>h("textarea",a);

function Av(name="",size=40,online=false,photo=null){
  const w=D({style:{position:"relative",flexShrink:0}});
  if(photo){w.appendChild(h("img",{src:photo,style:{width:size+"px",height:size+"px",borderRadius:"50%",objectFit:"cover",display:"block"}}));}
  else{w.appendChild(D({style:{width:size+"px",height:size+"px",borderRadius:"50%",background:aCol(name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:(size*.36)+"px",fontWeight:700,color:"#fff",userSelect:"none"}},ini(name)));}
  if(online)w.appendChild(D({style:{position:"absolute",bottom:"1px",right:"1px",width:Math.max(8,size*.22)+"px",height:Math.max(8,size*.22)+"px",borderRadius:"50%",background:C.accent,border:"2px solid "+C.panel}}));

const isAdmin=()=>S.user?.email===ADMIN_EMAIL;
async function saveUser(u,name){
  await setDoc(doc(db,"users",u.uid),{
    uid:u.uid,name:name||u.displayName||u.email,
    email:u.email,photoURL:u.photoURL||null,
    status:"online",lastSeen:serverTimestamp(),
    createdAt:serverTimestamp(),gps:S.gps,
    isAdmin:u.email===ADMIN_EMAIL,
  },{merge:true});
}
async function goOnline(){if(S.user)try{await updateDoc(doc(db,"users",S.user.uid),{status:"online",lastSeen:serverTimestamp(),...(S.gps?{gps:S.gps}:{})});}catch(_){}}
async function goOffline(){if(S.user)try{await updateDoc(doc(db,"users",S.user.uid),{status:"offline",lastSeen:serverTimestamp()});}catch(_){}}

function subChats(uid){
  if(S.unsubChats)S.unsubChats();
  S.unsubChats=onSnapshot(query(collection(db,"chats"),where("members","array-contains",uid)),snap=>{
    S.chats=snap.docs.map(d=>({id:d.id,...d.data()}));render();
  });
}
function subContacts(uid){
  if(S.unsubContacts)S.unsubContacts();
  // Privacy: users collection visible to all authenticated users, but chat lists are private
  S.unsubContacts=onSnapshot(query(collection(db,"users"),where("uid","!=",uid)),snap=>{
    S.contacts=snap.docs.map(d=>({id:d.id,...d.data()}));render();
  });
}
function subMsgs(chatId){
  if(S.unsubMsg)S.unsubMsg();
  S.messages=[];if(!chatId)return;
  S.unsubMsg=onSnapshot(query(collection(db,"chats",chatId,"messages"),orderBy("createdAt","asc"),limit(300)),snap=>{
    S.messages=snap.docs.map(d=>({id:d.id,...d.data()}));render();
    setTimeout(()=>document.getElementById("msgEnd")?.scrollIntoView({behavior:"smooth"}),60);
  });
}
async function getOrCreate(uid1,uid2){
  const cid=[uid1,uid2].sort().join("_");
  if(!(await getDoc(doc(db,"chats",cid))).exists())
    await setDoc(doc(db,"chats",cid),{members:[uid1,uid2],isGroup:false,createdAt:serverTimestamp(),lastMessage:"",lastMessageTime:serverTimestamp(),pinnedBy:[],mutedBy:[]});
  return cid;
}
async function sendMsg(payload){
  if(!S.activeChat)return;
  const cid=S.activeChat.id,u=S.user;
  await addDoc(collection(db,"chats",cid,"messages"),{
    senderId:u.uid,senderName:u.displayName||u.email,
    createdAt:serverTimestamp(),readBy:[u.uid],reactions:{},deleted:false,
    ...payload,
    ...(S.replyTo?{replyTo:{id:S.replyTo.id,text:S.replyTo.text||"",senderName:S.replyTo.senderName}}:{}),
  });
  const preview=payload.text||(payload.gif?"🎞️ GIF":payload.file?"📎 "+payload.file.name:payload.location?"📍 Location":"");
  await updateDoc(doc(db,"chats",cid),{lastMessage:preview,lastMessageTime:serverTimestamp(),lastSenderId:u.uid});
  S.replyTo=null;
}
async function uploadFile(file,onP){
  const path="chats/"+S.activeChat.id+"/"+Date.now()+"."+file.name.split(".").pop();
  const r=sRef(storage,path);
  return new Promise((res,rej)=>{
    const t=uploadBytesResumable(r,file,{contentType:file.type});
    t.on("state_changed",s=>onP(Math.round(s.bytesTransferred/s.totalBytes*100)),rej,
      async()=>{res({url:await getDownloadURL(t.snapshot.ref),name:file.name,size:file.size,type:file.type});});
  });
}
async function uploadAvatar(uid,file){
  const r=sRef(storage,"avatars/"+uid+"."+file.name.split(".").pop());
  return new Promise((res,rej)=>{
    const t=uploadBytesResumable(r,file,{contentType:file.type});
    t.on("state_changed",null,rej,async()=>res(await getDownloadURL(t.snapshot.ref)));
  });
}
async function reactMsg(cid,msgId,emoji){
  const r=doc(db,"chats",cid,"messages",msgId),snap=await getDoc(r),uid=S.user.uid;
  const rxs=snap.data()?.reactions||{};
  rxs[emoji]?.includes(uid)?await updateDoc(r,{["reactions."+emoji]:arrayRemove(uid)}):await updateDoc(r,{["reactions."+emoji]:arrayUnion(uid)});
}
async function delMsg(cid,msgId,all){
  const r=doc(db,"chats",cid,"messages",msgId);
  all?await updateDoc(r,{deleted:true,text:"",file:null,gif:null}):await updateDoc(r,{deletedFor:arrayUnion(S.user.uid)});

/* ── WebRTC ── */
async function startCall(chat,video){
  const oUid=chat.members?.find(m=>m!==S.user.uid);
  const other=S.contacts.find(c=>c.uid===oUid);
  S.call={remoteUid:oUid,remoteName:other?.name||other?.email||"User",remotePhoto:other?.photoURL,video,status:"calling",duration:0};
  render();
  try{
    localStr=await navigator.mediaDevices.getUserMedia({audio:true,video});
    setTimeout(()=>{const lv=document.getElementById("lv");if(lv)lv.srcObject=localStr;},100);
    pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"}]});
    localStr.getTracks().forEach(t=>pc.addTrack(t,localStr));
    pc.ontrack=e=>{setTimeout(()=>{const rv=document.getElementById("rv");if(rv)rv.srcObject=e.streams[0];},100);S.call.status="connected";render();callTimer=setInterval(()=>{S.call.duration++;render();},1000);};
    const callId=[S.user.uid,oUid].sort().join("_c_");
    pc.onicecandidate=async e=>{if(e.candidate)try{await updateDoc(doc(db,"calls",callId),{callerCandidates:arrayUnion(e.candidate.toJSON())});}catch(_){}};
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    await setDoc(doc(db,"calls",callId),{offer:{type:offer.type,sdp:offer.sdp},caller:S.user.uid,callee:oUid,video,status:"ringing",callerCandidates:[],calleeCandidates:[],createdAt:serverTimestamp()});
    callUnsub=onSnapshot(doc(db,"calls",callId),async snap=>{
      const data=snap.data();if(!data||!pc)return;
      if(data.answer&&pc.signalingState==="have-local-offer")await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      if(data.calleeCandidates?.length&&pc.remoteDescription)for(const c of data.calleeCandidates)try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(_){}
      if(data.status==="ended")endCall(true);
    });
  }catch(e){S.call.status="failed";render();}
}
async function endCall(remote=false){
  clearInterval(callTimer);callTimer=null;
  if(!remote&&S.call)try{await updateDoc(doc(db,"calls",[S.user.uid,S.call.remoteUid].sort().join("_c_")),{status:"ended"});}catch(_){}
  if(callUnsub){callUnsub();callUnsub=null;}
  localStr?.getTracks().forEach(t=>t.stop());localStr=null;pc?.close();pc=null;S.call=null;render();
}

/* ── Voice ── */
async function startRec(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    S.mediaRec=new MediaRecorder(stream);S.recChunks=[];
    S.mediaRec.ondataavailable=e=>S.recChunks.push(e.data);
    S.mediaRec.onstop=async()=>{
      const blob=new Blob(S.recChunks,{type:"audio/webm"}),file=new File([blob],"voice-"+Date.now()+".webm",{type:"audio/webm"});
      stream.getTracks().forEach(t=>t.stop());
      S.recording=false;S.recTime=0;clearInterval(S.recInt);S.uploadPct=0;render();
      try{const fd=await uploadFile(file,p=>{S.uploadPct=p;render();});await sendMsg({file:fd});}catch(e){console.error(e);}
      S.uploadPct=null;render();
    };
    S.mediaRec.start();S.recording=true;S.recInt=setInterval(()=>{S.recTime++;render();},1000);render();
  }catch(e){alert("Microphone access denied.");}
}
function stopRec(){S.mediaRec?.stop();}
function cancelRec(){S.mediaRec?.stream?.getTracks().forEach(t=>t.stop());S.mediaRec=null;S.recording=false;S.recTime=0;clearInterval(S.recInt);render();}

    const emojiContent=D({style:{flex:1,overflowY:"auto",padding:"8px",display:"flex",flexWrap:"wrap",gap:"2px"}});
    function showCat(i){
      catTabs.querySelectorAll("button").forEach((b,j)=>{b.style.borderBottom=j===i?"2px solid "+C.accent:"2px solid transparent";b.style.color=j===i?C.accent:C.muted;});
      emojiContent.innerHTML="";
      for(const e of ECAT[i].e){
        const sp=Sp({style:{fontSize:"22px",cursor:"pointer",padding:"4px",borderRadius:"6px",lineHeight:1,userSelect:"none"},onClick:()=>{const ti=document.getElementById("txti");if(ti){ti.value+=e;ti.dispatchEvent(new Event("input"));}}},e);
        sp.addEventListener("mouseenter",()=>sp.style.background=C.border);sp.addEventListener("mouseleave",()=>sp.style.background="transparent");
        emojiContent.appendChild(sp);
      }
    }
    ECAT.forEach((cat,i)=>{const b=Bt({style:{background:"none",border:"none",borderBottom:"2px solid transparent",padding:"8px 10px",fontSize:"18px",cursor:"pointer",flexShrink:0,color:C.muted},onClick:()=>showCat(i)},cat.ic);catTabs.appendChild(b);});
    ep.append(catTabs,emojiContent);showCat(0);
    win.appendChild(ep);
  }

  /* GIF picker */
  if(S.showGif){
    const gp2=D({style:{margin:"0 14px 4px",background:C.card,borderRadius:"14px",border:"1px solid "+C.border,overflow:"hidden",flexShrink:0,maxHeight:"260px",display:"flex",flexDirection:"column"}});
    const gBar=D({style:{display:"flex",gap:"8px",padding:"8px",flexShrink:0,borderBottom:"1px solid "+C.border}});
    const gI=In({placeholder:"Search GIFs…",style:{flex:1,padding:"7px 12px",borderRadius:"20px",border:"1px solid "+C.border,background:C.panel,color:C.text,fontSize:"13px",outline:"none"}});
    let deb;gI.addEventListener("input",e=>{clearTimeout(deb);deb=setTimeout(()=>loadGifs(e.target.value),450);});
    gBar.append(Sp({style:{fontSize:"18px",alignSelf:"center",flexShrink:0}},"🎞️"),gI);
    const gGrid=D({style:{flex:1,overflowY:"auto",padding:"8px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"6px"}});
    function refreshGif(){
      gGrid.innerHTML="";
      if(S.gifBusy){gGrid.appendChild(D({style:{gridColumn:"1/-1",textAlign:"center",padding:"24px",color:C.muted}},"⏳ Loading GIFs…"));return;}
      if(!S.gifRes.length){gGrid.appendChild(D({style:{gridColumn:"1/-1",textAlign:"center",padding:"24px",color:C.muted}},"Search for GIFs above"));return;}
      for(const gif of S.gifRes){
        const img=h("img",{src:gif.thumb,alt:"gif",style:{width:"100%",height:"75px",objectFit:"cover",borderRadius:"8px",cursor:"pointer",border:"2px solid transparent",transition:"border .15s"}});
        img.addEventListener("mouseenter",()=>img.style.borderColor=C.accent);img.addEventListener("mouseleave",()=>img.style.borderColor="transparent");
        img.addEventListener("click",async()=>{S.showGif=false;await sendMsg({gif:gif.url,text:""});render();});
        gGrid.appendChild(img);
      }
    }
    gp2.append(gBar,gGrid);
    win.appendChild(gp2);
    if(!S.gifRes.length&&!S.gifBusy)loadGifs("");
    else refreshGif();
  }

  /* attach menu */
  if(S.showAttach){
    const am=D({style:{margin:"0 14px 6px",padding:"14px 18px",background:C.card,borderRadius:"14px",display:"flex",gap:"20px",flexWrap:"wrap",flexShrink:0}});
    const fi=In({type:"file",style:{display:"none"}});
    fi.addEventListener("change",async e=>{
      const f=e.target.files[0];if(!f)return;S.showAttach=false;S.uploadPct=0;render();
      try{const fd=await uploadFile(f,p=>{S.uploadPct=p;render();});await sendMsg({file:fd});}catch(err){console.error(err);}
      S.uploadPct=null;render();
    });
    am.appendChild(fi);
    function mkA(ic,label,fn){const a=D({style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",cursor:"pointer"},onClick:fn});a.append(D({style:{width:"52px",height:"52px",borderRadius:"50%",background:C.panel,border:"1px solid "+C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px"}},ic),Sp({style:{color:C.muted,fontSize:"11px",fontWeight:600}},label));return a;}
    am.append(
      mkA("🖼️","Photo/Video",()=>{fi.accept="image/*,video/*";fi.click();}),
      mkA("📄","Document",()=>{fi.accept="*/*";fi.click();}),
      mkA("📍","Location",()=>{navigator.geolocation.getCurrentPosition(async p=>{await sendMsg({location:{lat:p.coords.latitude,lng:p.coords.longitude}});});S.showAttach=false;render();}),
      mkA("📷","Camera",()=>{fi.accept="image/*";fi.capture="environment";fi.click();}),
    );
    win.appendChild(am);
  }

  /* input bar */
  const bar=D({style:{padding:"10px 14px",background:C.panel,borderTop:"1px solid "+C.border,display:"flex",alignItems:"center",gap:"6px",flexShrink:0}});
  bar.append(
    Bt({style:{background:"none",border:"none",fontSize:"22px",padding:"6px",cursor:"pointer",flexShrink:0,color:S.showEmoji?C.accent:C.muted,borderRadius:"50%"},title:"Emoji",onClick(){S.showEmoji=!S.showEmoji;S.showGif=false;S.showAttach=false;render();}},"😊"),
    Bt({style:{background:S.showGif?C.accent+"20":"none",border:S.showGif?"1px solid "+C.accent:"1px solid "+C.border,borderRadius:"8px",color:S.showGif?C.accent:C.muted,fontSize:"12px",fontWeight:700,padding:"5px 8px",cursor:"pointer",flexShrink:0},title:"GIF",onClick(){S.showGif=!S.showGif;S.showEmoji=false;S.showAttach=false;render();}},"GIF"),
    Bt({style:{background:"none",border:"none",fontSize:"22px",padding:"6px",cursor:"pointer",flexShrink:0,color:S.showAttach?C.accent:C.muted,borderRadius:"50%"},title:"Attach",onClick(){S.showAttach=!S.showAttach;S.showEmoji=false;S.showGif=false;render();}},"📎"),
  );
  const iWrap=D({style:{flex:1,background:C.card,borderRadius:"24px",padding:"10px 16px",display:"flex",alignItems:"center"}});
  const txti=In({id:"txti",placeholder:"Type a message",style:{background:"none",border:"none",color:C.text,fontSize:"14px",width:"100%",outline:"none"}});
  txti.addEventListener("keydown",async e=>{
    if(e.key==="Enter"&&!e.shiftKey){
      e.preventDefault();
      const v=txti.value.trim();
      if(v){txti.value="";sendB.style.background=C.card;sendB.textContent="🎙";await sendMsg({text:v});}
    }
  });
  iWrap.appendChild(txti);bar.appendChild(iWrap);
  const sendB=Bt({style:{width:"46px",height:"46px",borderRadius:"50%",border:"none",background:C.card,fontSize:"20px",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .2s",flexShrink:0,cursor:"pointer"},
    async onClick(){
      const v=txti.value.trim();
      if(v){txti.value="";sendB.style.background=C.card;sendB.textContent="🎙";await sendMsg({text:v});}
      else if(!S.recording)await startRec();
    }},"🎙");
  txti.addEventListener("input",()=>{const v=txti.value.trim();sendB.style.background=v?C.accent:C.card;sendB.textContent=v?"➤":"🎙";});
  bar.appendChild(sendB);
  win.appendChild(bar);
  return win;
}

/* ── Message Bubble ── */
const RXS=["👍","❤️","😂","😮","😢","🙏","🔥","🎉","😍","👏"];
function buildBubble(msg,prev,isGroup,uid,cid){
  const isMe=msg.senderId===uid,ps=prev?.senderId===msg.senderId;
  if(msg.deleted)return D({style:{display:"flex",justifyContent:isMe?"flex-end":"flex-start",marginTop:"4px"}},D({style:{padding:"6px 14px",borderRadius:"12px",border:"1px solid "+C.border,color:C.muted,fontSize:"13px",fontStyle:"italic"}},"🚫 This message was deleted"));
  const wrap=D({style:{position:"relative",display:"flex",flexDirection:"column",alignItems:isMe?"flex-end":"flex-start",marginTop:ps?"2px":"10px"}});
  if(msg.replyTo){const rp=D({style:{maxWidth:"65%",marginBottom:"3px",padding:"6px 10px",borderRadius:"8px",background:C.card,borderLeft:"3px solid "+C.accent,fontSize:"12px",color:C.muted}});rp.append(D({style:{color:C.accent,fontWeight:600,marginBottom:"1px"}},msg.replyTo.senderName),D({},msg.replyTo.text||"📎"));wrap.appendChild(rp);}
  const row=D({style:{display:"flex",alignItems:"flex-end",gap:"6px",flexDirection:isMe?"row-reverse":"row"}});
  if(isGroup&&!isMe&&!ps)row.appendChild(Av(msg.senderName||"?",26));
  else if(isGroup&&!isMe&&ps)row.appendChild(D({style:{width:"26px"}}));
  const bub=D({style:{maxWidth:"68%",padding:"8px 12px",borderRadius:isMe?"18px 18px 4px 18px":"18px 18px 18px 4px",background:isMe?C.out:C.inn,border:"1px solid "+(isMe?"#005c4b80":C.border),cursor:"context-menu",position:"relative"}});
  if(isGroup&&!isMe)bub.appendChild(D({style:{color:C.accent,fontSize:"11px",fontWeight:700,marginBottom:"3px"}},msg.senderName||""));
  if(msg.gif){const g=h("img",{src:msg.gif,alt:"GIF",style:{maxWidth:"100%",maxHeight:"200px",borderRadius:"8px",display:"block",marginBottom:msg.text?"6px":"0"}});bub.appendChild(g);}
  const isImg=msg.file?.type?.startsWith("image/"),isVid=msg.file?.type?.startsWith("video/"),isAud=msg.file?.type?.startsWith("audio/");
  if(isImg){const img=h("img",{src:msg.file.url,style:{maxWidth:"100%",maxHeight:"260px",borderRadius:"8px",display:"block",marginBottom:msg.text?"6px":"0",cursor:"zoom-in",objectFit:"cover"}});img.addEventListener("click",()=>{const ov=D({style:{position:"fixed",inset:0,background:"#000e",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}},h("img",{src:msg.file.url,style:{maxWidth:"95vw",maxHeight:"95vh",objectFit:"contain"}}));ov.addEventListener("click",()=>ov.remove());document.body.appendChild(ov);});bub.appendChild(img);}
  if(isVid)bub.appendChild(h("video",{controls:"",src:msg.file.url,style:{maxWidth:"100%",maxHeight:"240px",borderRadius:"8px",display:"block",marginBottom:msg.text?"6px":"0"}}));
  if(isAud){const ar=D({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:msg.text?"6px":"0",minWidth:"180px"}});ar.append(Sp({style:{fontSize:"22px"}},"🎙"),h("audio",{controls:"",src:msg.file.url,style:{flex:1,height:"32px"}}));bub.appendChild(ar);}
  if(msg.file&&!isImg&&!isVid&&!isAud){const fa=h("a",{href:msg.file.url,target:"_blank",rel:"noreferrer",style:{display:"flex",alignItems:"center",gap:"10px",textDecoration:"none",background:C.card,borderRadius:"8px",padding:"8px 10px",marginBottom:msg.text?"6px":"0"}});fa.append(Sp({style:{fontSize:"26px"}},fIcon(msg.file.type)),D({},D({style:{color:C.text,fontSize:"13px",fontWeight:600,wordBreak:"break-all"}},msg.file.name),D({style:{color:C.muted,fontSize:"11px"}},fmtB(msg.file.size))));bub.appendChild(fa);}
  if(msg.location){const la=h("a",{href:"https://maps.google.com/?q="+msg.location.lat+","+msg.location.lng,target:"_blank",rel:"noreferrer",style:{display:"flex",alignItems:"center",gap:"8px",textDecoration:"none",background:C.card,borderRadius:"8px",padding:"8px 12px",marginBottom:msg.text?"6px":"0"}});la.append(Sp({style:{fontSize:"24px"}},"📍"),D({},D({style:{color:C.text,fontSize:"13px",fontWeight:600}},"Shared Location"),D({style:{color:C.muted,fontSize:"11px"}},msg.location.lat.toFixed(5)+", "+msg.location.lng.toFixed(5)),D({style:{color:C.accent,fontSize:"11px"}},"Tap to open in Maps")));bub.appendChild(la);}
  if(msg.text)bub.appendChild(D({style:{color:C.text,fontSize:"14px",lineHeight:"1.55",wordBreak:"break-word"}},msg.text));
  const tr=D({style:{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:"3px",marginTop:"3px",color:isMe?"#a7f3d0":C.muted,fontSize:"10px"}});
  tr.append(fmtT(msg.createdAt));if(isMe)tr.appendChild(Sp({},msg.readBy?.length>1?"✓✓":"✓"));
  bub.appendChild(tr);
  let pt=null;
  const openCtx=()=>ctxMenu(msg,bub,isMe,cid);
  bub.addEventListener("mousedown",()=>{pt=setTimeout(openCtx,500);});
  bub.addEventListener("mouseup",()=>clearTimeout(pt));
  bub.addEventListener("touchstart",()=>{pt=setTimeout(openCtx,500);},{passive:true});
  bub.addEventListener("touchend",()=>clearTimeout(pt));
  bub.addEventListener("contextmenu",e=>{e.preventDefault();openCtx();});
  row.appendChild(bub);
  const qr=Bt({style:{background:"none",border:"none",color:C.muted,fontSize:"14px",opacity:.5,padding:"2px",flexShrink:0,cursor:"pointer"},onClick:()=>rxPicker(msg,wrap,isMe,cid)},"😊");
  row.appendChild(qr);wrap.appendChild(row);
  const rxs=msg.reactions||{},rxE=Object.entries(rxs).filter(([,u])=>u?.length>0);
  if(rxE.length){const rxRow=D({style:{display:"flex",gap:"4px",marginTop:"3px",flexWrap:"wrap",justifyContent:isMe?"flex-end":"flex-start"}});for(const[e,u]of rxE){const rb=D({style:{background:C.card,border:"1px solid "+C.border,borderRadius:"20px",padding:"2px 8px",fontSize:"12px",cursor:"pointer",display:"flex",alignItems:"center",gap:"3px"},onClick:()=>reactMsg(cid,msg.id,e)});rb.append(e,Sp({style:{color:C.muted}},u.length));rxRow.appendChild(rb);}wrap.appendChild(rxRow);}
  return wrap;
}
function rxPicker(msg,wrap,isMe,cid){
  document.querySelectorAll(".rxp").forEach(e=>e.remove());
  const p=D({class:"rxp",style:{position:"absolute",zIndex:50,bottom:"105%",[isMe?"right":"left"]:"0",background:C.panel,border:"1px solid "+C.border,borderRadius:"30px",padding:"8px 12px",display:"flex",gap:"8px",boxShadow:"0 4px 24px rgba(0,0,0,.5)"}});
  for(const e of RXS)p.appendChild(Sp({style:{fontSize:"22px",cursor:"pointer",padding:"2px",borderRadius:"4px"},onClick:()=>{reactMsg(cid,msg.id,e);p.remove();render();}},e));
  p.appendChild(Sp({style:{color:C.muted,cursor:"pointer",fontSize:"16px",alignSelf:"center",paddingLeft:"4px"},onClick:()=>p.remove()},"✕"));
  wrap.style.position="relative";wrap.appendChild(p);
  setTimeout(()=>document.addEventListener("click",()=>p.remove(),{once:true}),50);
}
function ctxMenu(msg,bub,isMe,cid){
  document.querySelectorAll(".ctx").forEach(e=>e.remove());
  const menu=D({class:"ctx",style:{position:"fixed",zIndex:300,background:C.panel,border:"1px solid "+C.border,borderRadius:"14px",overflow:"hidden",boxShadow:"0 6px 32px rgba(0,0,0,.65)",minWidth:"200px"}});
  const r=bub.getBoundingClientRect();
  menu.style.top=Math.min(r.bottom+6,window.innerHeight-260)+"px";
  menu.style[isMe?"right":"left"]=isMe?(window.innerWidth-r.right+4)+"px":(r.left+4)+"px";
  const items=[
    ["↩️  Reply",()=>{S.replyTo=msg;render();}],
    ["😊  React",()=>rxPicker(msg,bub.parentElement?.parentElement,isMe,cid)],
    ["📋  Copy",()=>navigator.clipboard.writeText(msg.text||"")],
    ["⭐  Star",()=>{}],
    ["🔁  Forward",()=>{}],
    ...(isMe?[["🗑️  Delete for me",()=>delMsg(cid,msg.id,false)],["🗑️  Delete for everyone",()=>delMsg(cid,msg.id,true)]]:[] ),
  ];
  for(const[label,fn]of items){
    const it=D({style:{padding:"12px 18px",color:label.includes("Delete")?C.red:C.text,fontSize:"14px",cursor:"pointer",borderBottom:"1px solid "+C.border+"20"},onClick(){fn();menu.remove();}},label);
    it.addEventListener("mouseenter",()=>it.style.background=C.border+"40");it.addEventListener("mouseleave",()=>it.style.background="transparent");
    menu.appendChild(it);
  }
  menu.appendChild(D({style:{padding:"10px 18px",color:C.muted,fontSize:"13px",cursor:"pointer"},onClick:()=>menu.remove()},"Cancel"));
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener("click",()=>menu.remove(),{once:true}),50);
}

/* ══════════════════════════════════════════════
   MAIN RENDER
══════════════════════════════════════════════ */
function render(){
  const root=document.getElementById("app");root.innerHTML="";
  if(S.loading){root.appendChild(D({style:{height:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.accent,fontSize:"56px"}},"💬"));return;}
  if(!S.gps){root.appendChild(screenGPS());return;}
  if(!S.user){root.appendChild(screenLogin());return;}
  if(S.call){root.appendChild(screenCall());return;}
  const layout=D({style:{height:"100vh",display:"flex",overflow:"hidden"}});
  const showSide=!S.mobile||!S.activeChat;
  const showChat=!S.mobile||!!S.activeChat;
  if(showSide){const sw=D({style:{width:S.mobile?"100%":"360px",flexShrink:0,height:"100%"}});sw.appendChild(buildSidebar());layout.appendChild(sw);}
  if(showChat)layout.appendChild(buildChat());
  root.appendChild(layout);
}

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
render();
onAuthStateChanged(auth,async u=>{
  S.loading=false;
  if(u){S.user=u;subChats(u.uid);subContacts(u.uid);subStatuses();goOnline();}
  else{S.user=null;S.chats=[];S.contacts=[];S.messages=[];S.activeChat=null;}
  render();
});
window.addEventListener("resize",()=>{S.mobile=window.innerWidth<768;render();});
window.addEventListener("beforeunload",()=>{goOffline();});
window.addEventListener("visibilitychange",()=>{document.hidden?goOffline():goOnline();});
navigator.geolocation?.watchPosition(pos=>{
  S.gps={lat:pos.coords.latitude,lng:pos.coords.longitude};
  if(S.user)try{updateDoc(doc(db,"users",S.user.uid),{gps:S.gps,lastSeen:serverTimestamp()});}catch(_){}
  render();
},null,{enableHighAccuracy:true,maximumAge:10000});
</script>
</body>
