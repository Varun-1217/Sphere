/* ── Palette ─────────────────────────────────── */
const C={bg:"#0a0f1e",panel:"#111827",card:"#1a2235",border:"#1e2d45",
  accent:"#25d366",dim:"#128c4a",blue:"#4f8ef7",red:"#ef4444",

const AV_COLORS=["#4f8ef7","#a855f7","#f97316","#ec4899","#14b8a6","#f59e0b","#ef4444","#10b981"];
const aColor=n=>AV_COLORS[(n||"A").charCodeAt(0)%AV_COLORS.length];
const ini=n=>(n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
const fmtT=ts=>{if(!ts)return"";const d=ts.toDate?ts.toDate():new Date(ts);return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");};
const fmtD=ts=>{if(!ts)return"";const d=ts.toDate?ts.toDate():new Date(ts),now=new Date(),diff=(now-d)/86400000;if(diff<1)return fmtT(ts);if(diff<2)return"Yesterday";if(diff<7)return d.toLocaleDateString("en",{weekday:"short"});return d.toLocaleDateString("en",{day:"2-digit",month:"2-digit"});};
const fmtB=b=>b<1024?b+"B":b<1048576?(b/1024).toFixed(1)+"KB":(b/1048576).toFixed(1)+"MB";
const fIcon=t=>t?.startsWith("image/")?"🖼️":t?.startsWith("video/")?"🎬":t?.startsWith("audio/")?"🎙":t?.includes("pdf")?"📄":"📎";

/* ── DOM helpers ─────────────────────────────── */
function h(tag,attrs,...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function")e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="html")e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for(const c of kids){if(c==null||c===false)continue;e.appendChild(typeof c==="string"?document.createTextNode(c):c);}
  return e;
}
const d=(a,...c)=>h("div",a,...c);
const s=(a,...c)=>h("span",a,...c);
const b=(a,...c)=>h("button",a,...c);
const inp=a=>h("input",a);

function av(name,size=40,online=false,photo=null){
  const w=d({style:{position:"relative",flexShrink:0}});
  if(photo){w.appendChild(h("img",{src:photo,style:{width:size+"px",height:size+"px",borderRadius:"50%",objectFit:"cover"}}));}
  else{w.appendChild(d({style:{width:size+"px",height:size+"px",borderRadius:"50%",background:aColor(name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:(size*.36)+"px",fontWeight:700,color:"#fff",userSelect:"none"}},ini(name)));}
  if(online)w.appendChild(d({style:{position:"absolute",bottom:"1px",right:"1px",width:Math.max(8,size*.22)+"px",height:Math.max(8,size*.22)+"px",borderRadius:"50%",background:C.accent,border:"2px solid "+C.panel}}));
  return w;
}

/* ── Firebase ops ────────────────────────────── */
async function saveUser(u,name){
  await setDoc(doc(db,"users",u.uid),{uid:u.uid,name:name||u.displayName||u.email,email:u.email,photoURL:u.photoURL||null,status:"online",lastSeen:serverTimestamp(),createdAt:serverTimestamp(),gps:S.gps},{merge:true});
}
async function setOnline(uid,status){
  try{await updateDoc(doc(db,"users",uid),{status,lastSeen:serverTimestamp(),...(S.gps?{gps:S.gps}:{})});}catch(_){}
}
function subChats(uid){
  if(S.unsubChats)S.unsubChats();
  S.unsubChats=onSnapshot(query(collection(db,"chats"),where("members","array-contains",uid)),snap=>{S.chats=snap.docs.map(d=>({id:d.id,...d.data()}));render();});
}
function subContacts(uid){
  if(S.unsubContacts)S.unsubContacts();
  S.unsubContacts=onSnapshot(query(collection(db,"users"),where("uid","!=",uid)),snap=>{S.contacts=snap.docs.map(d=>({id:d.id,...d.data()}));render();});
}
function subMsgs(chatId){
  if(S.unsubMsg)S.unsubMsg();
  S.messages=[];
  if(!chatId)return;
  S.unsubMsg=onSnapshot(query(collection(db,"chats",chatId,"messages"),orderBy("createdAt","asc"),limit(200)),snap=>{
    S.messages=snap.docs.map(d=>({id:d.id,...d.data()}));render();
    setTimeout(()=>document.getElementById("msgEnd")?.scrollIntoView({behavior:"smooth"}),50);
  });
}
async function getOrCreate(uid1,uid2){
  const cid=[uid1,uid2].sort().join("_");
  const r=doc(db,"chats",cid);
  if(!(await getDoc(r)).exists())await setDoc(r,{members:[uid1,uid2],isGroup:false,createdAt:serverTimestamp(),lastMessage:"",lastMessageTime:serverTimestamp(),pinnedBy:[],mutedBy:[]});
  return cid;
}
async function sendMsg(payload){
  if(!S.activeChat)return;
  const cid=S.activeChat.id,u=S.user;
  await addDoc(collection(db,"chats",cid,"messages"),{senderId:u.uid,senderName:u.displayName||u.email,createdAt:serverTimestamp(),readBy:[u.uid],reactions:{},deleted:false,...payload,...(S.replyTo?{replyTo:{id:S.replyTo.id,text:S.replyTo.text||"",senderName:S.replyTo.senderName}}:{})});
  const preview=payload.text||(payload.file?"📎 "+payload.file.name:payload.location?"📍 Location":"");
  await updateDoc(doc(db,"chats",cid),{lastMessage:preview,lastMessageTime:serverTimestamp(),lastSenderId:u.uid});
  S.replyTo=null;
}
async function uploadFile(file,onP){
  const cid=S.activeChat.id,ext=file.name.split(".").pop(),path="chats/"+cid+"/"+Date.now()+"."+ext,r=sRef(storage,path);
  return new Promise((res,rej)=>{
    const t=uploadBytesResumable(r,file,{contentType:file.type});
    t.on("state_changed",snap=>onP(Math.round(snap.bytesTransferred/snap.totalBytes*100)),rej,async()=>{const url=await getDownloadURL(t.snapshot.ref);res({url,name:file.name,size:file.size,type:file.type});});
  });
}
async function reactMsg(msgId,emoji){
  const r=doc(db,"chats",S.activeChat.id,"messages",msgId),snap=await getDoc(r),uid=S.user.uid;
  const rxs=snap.data()?.reactions||{};
  rxs[emoji]?.includes(uid)?await updateDoc(r,{["reactions."+emoji]:arrayRemove(uid)}):await updateDoc(r,{["reactions."+emoji]:arrayUnion(uid)});
}
async function delMsg(msgId,all){
  const r=doc(db,"chats",S.activeChat.id,"messages",msgId);
  all?await updateDoc(r,{deleted:true,text:"",file:null}):await updateDoc(r,{deletedFor:arrayUnion(S.user.uid)});
}
function subStatuses(){
  const cutoff=new Date(Date.now()-86400000);
  onSnapshot(query(collection(db,"statuses"),where("expiresAt",">",cutoff)),snap=>{S.statuses=snap.docs.map(d=>({id:d.id,...d.data()}));render();});
}
async function postStatus(text){
  await addDoc(collection(db,"statuses"),{uid:S.user.uid,userName:S.user.displayName||S.user.email,text,imageUrl:null,createdAt:serverTimestamp(),expiresAt:new Date(Date.now()+86400000),views:[]});
}

/* ── WebRTC ──────────────────────────────────── */
let pc=null,localStr=null,callUnsub=null,callTimer=null;
async function startCall(chat,video){
  const otherUid=chat.members?.find(m=>m!==S.user.uid);
  const other=S.contacts.find(c=>c.uid===otherUid);
  S.call={remoteUid:otherUid,remoteName:other?.name||other?.email||"User",remotePhoto:other?.photoURL,video,status:"calling",duration:0};
  render();
  try{
    localStr=await navigator.mediaDevices.getUserMedia({audio:true,video});
    setTimeout(()=>{const lv=document.getElementById("lv");if(lv)lv.srcObject=localStr;},100);
    pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
    localStr.getTracks().forEach(t=>pc.addTrack(t,localStr));
    pc.ontrack=e=>{setTimeout(()=>{const rv=document.getElementById("rv");if(rv)rv.srcObject=e.streams[0];},100);S.call.status="connected";render();callTimer=setInterval(()=>{S.call.duration++;render();},1000);};
    const callId=[S.user.uid,otherUid].sort().join("_call_");
    pc.onicecandidate=async e=>{if(e.candidate){try{await updateDoc(doc(db,"calls",callId),{callerCandidates:arrayUnion(e.candidate.toJSON())});}catch(_){}}};
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    await setDoc(doc(db,"calls",callId),{offer:{type:offer.type,sdp:offer.sdp},caller:S.user.uid,callee:otherUid,video,status:"ringing",callerCandidates:[],calleeCandidates:[],createdAt:serverTimestamp()});
    callUnsub=onSnapshot(doc(db,"calls",callId),async snap=>{
      const data=snap.data();if(!data||!pc)return;
      if(data.answer&&pc.signalingState==="have-local-offer")await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      if(data.calleeCandidates?.length&&pc.remoteDescription)for(const c of data.calleeCandidates){try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(_){}}
      if(data.status==="ended")endCall(true);
    });
  }catch(e){S.call.status="failed";render();}
}
async function endCall(remote=false){
  clearInterval(callTimer);callTimer=null;
  if(!remote&&S.call){
    try{const cid=[S.user.uid,S.call.remoteUid].sort().join("_call_");await updateDoc(doc(db,"calls",cid),{status:"ended"});}catch(_){}
  }
  if(callUnsub){callUnsub();callUnsub=null;}
  localStr?.getTracks().forEach(t=>t.stop());localStr=null;
  pc?.close();pc=null;S.call=null;render();
}

/* ── Voice recording ─────────────────────────── */
async function startRec(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    S.mediaRec=new MediaRecorder(stream);S.recChunks=[];
    S.mediaRec.ondataavailable=e=>S.recChunks.push(e.data);
    S.mediaRec.onstop=async()=>{
      const blob=new Blob(S.recChunks,{type:"audio/webm"}),file=new File([blob],"voice-"+Date.now()+".webm",{type:"audio/webm"});
      stream.getTracks().forEach(t=>t.stop());
      S.recording=false;S.recTime=0;clearInterval(S.recInt);S.uploadPct=0;render();
      try{const fd=await uploadFile(file,p=>{S.uploadPct=p;render();});await sendMsg({file:fd});}catch(e){console.error(e);}
      S.uploadPct=null;render();
    };
    S.mediaRec.start();S.recording=true;
    S.recInt=setInterval(()=>{S.recTime++;render();},1000);render();
  }catch(e){alert("Mic access denied");}
}
function stopRec(){S.mediaRec?.stop();}
function cancelRec(){S.mediaRec?.stream?.getTracks().forEach(t=>t.stop());S.mediaRec=null;S.recording=false;S.recTime=0;clearInterval(S.recInt);render();}

function screenGPS(){
  let st="idle";
  const errDiv=d({style:{display:"none",background:"#ef444420",border:"1px solid #ef4444",borderRadius:"10px",padding:"12px",marginBottom:"16px",color:"#ef4444",fontSize:"13px",lineHeight:"1.5"}});
  const btn1=b({style:{width:"100%",padding:"14px",borderRadius:"12px",border:"none",background:C.accent,color:"#fff",fontSize:"15px",fontWeight:700},
    onClick(){
      if(st==="requesting")return;st="requesting";btn1.textContent="⏳ Requesting…";btn1.style.background=C.dim;
      navigator.geolocation.getCurrentPosition(
        pos=>{S.gps={lat:pos.coords.latitude,lng:pos.coords.longitude};render();},
        ()=>{st="denied";btn1.textContent="📍 Allow Location & Continue";btn1.style.background=C.accent;errDiv.style.display="block";errDiv.textContent="⚠️ Location denied. Open browser Settings → Site Permissions → Location → Allow, then retry.";},
        {enableHighAccuracy:true,timeout:12000}
      );
    }},"📍 Allow Location & Continue");
  return d({style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}},
    d({style:{background:C.panel,border:"1px solid "+C.border,borderRadius:"20px",padding:"48px 36px",maxWidth:"400px",width:"90%",textAlign:"center"}},
      d({style:{fontSize:"56px",marginBottom:"12px"}},"📍"),
      h("h2",{style:{color:C.text,margin:"0 0 8px",fontSize:"22px",fontWeight:800}},"Location Required"),
      h("p",{style:{color:C.muted,margin:"0 0 24px",lineHeight:"1.7",fontSize:"14px"}},"ChatSphere requires your precise GPS location to enable live sharing. This is mandatory to continue."),
      errDiv,btn1,
      h("p",{style:{color:C.muted,fontSize:"11px",marginTop:"16px"}},"🔒 Encrypted · Never sold · You control sharing"),
    ));
}

function screenLogin(){
  let tab="google",mode="signin";
  const root=d({style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}});
  const card=d({style:{background:C.panel,border:"1px solid "+C.border,borderRadius:"20px",padding:"44px 36px",maxWidth:"420px",width:"90%"}});
  const errBox=d({style:{display:"none",background:"#ef444420",border:"1px solid #ef4444",borderRadius:"8px",padding:"10px 14px",marginBottom:"14px",color:"#ef4444",fontSize:"13px"}});
  const showErr=msg=>{errBox.textContent=msg;errBox.style.display="block";};
  const tabBar=d({style:{display:"flex",background:C.card,borderRadius:"10px",padding:"4px",marginBottom:"20px"}});
  const body=d({});
  function mkTabBtn(t,l){return b({style:{flex:1,padding:"10px",border:"none",borderRadius:"8px",fontWeight:600,fontSize:"13px",background:tab===t?C.accent:"transparent",color:tab===t?"#fff":C.muted},onClick(){tab=t;rebuild();}},l);}
  function mkInp(ph,type="text"){return inp({type,placeholder:ph,style:{padding:"12px 14px",borderRadius:"10px",border:"1px solid "+C.border,background:C.card,color:C.text,fontSize:"14px",outline:"none",width:"100%",marginBottom:"10px"}});}
  function rebuild(){
    tabBar.innerHTML="";tabBar.append(mkTabBtn("google","🔑 Google"),mkTabBtn("email","✉️ Email"));
    body.innerHTML="";errBox.style.display="none";
    if(tab==="google"){
      body.appendChild(b({style:{width:"100%",padding:"14px",borderRadius:"12px",border:"1px solid "+C.border,background:C.card,color:C.text,fontSize:"15px",fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"},
        async onClick(){try{const r=await signInWithPopup(auth,gp);await saveUser(r.user,r.user.displayName);}catch(e){showErr(e.message);}}},
        s({style:{fontSize:"18px"}},"G")," Continue with Google"));
    }else{
      const modeBar=d({style:{display:"flex",background:C.card,borderRadius:"8px",padding:"3px",marginBottom:"12px"}});
      modeBar.append(...[["signin","Sign In"],["signup","Create Account"]].map(([m,l])=>b({style:{flex:1,padding:"8px",border:"none",borderRadius:"6px",fontWeight:600,fontSize:"12px",background:mode===m?C.blue:"transparent",color:mode===m?"#fff":C.muted},onClick(){mode=m;rebuild();}},l)));
      const nameI=mkInp("Full Name"),emailI=mkInp("Email","email"),passI=mkInp("Password","password");
      const submitB=b({style:{width:"100%",padding:"14px",borderRadius:"12px",border:"none",background:C.accent,color:"#fff",fontSize:"15px",fontWeight:700},
        async onClick(){
          errBox.style.display="none";
          try{
            let r;
            if(mode==="signup"){r=await createUserWithEmailAndPassword(auth,emailI.value,passI.value);await updateProfile(r.user,{displayName:nameI.value});}
            else r=await signInWithEmailAndPassword(auth,emailI.value,passI.value);
            await saveUser(r.user,nameI.value||r.user.displayName);
          }catch(e){showErr(e.code==="auth/wrong-password"?"Wrong password":e.code==="auth/user-not-found"?"No account — sign up instead":e.code==="auth/email-already-in-use"?"Email taken — sign in instead":e.message);}
        }},mode==="signin"?"Sign In":"Create Account");
      body.append(modeBar,...(mode==="signup"?[nameI]:[]),emailI,passI,submitB);
    }
  }
  rebuild();
  card.append(
    d({style:{textAlign:"center",marginBottom:"28px"}},
      d({style:{fontSize:"48px",marginBottom:"8px"}},"💬"),
      h("h1",{style:{color:C.accent,margin:0,fontSize:"28px",fontWeight:800}},"ChatSphere"),
      d({style:{color:C.muted,fontSize:"12px",marginTop:"4px"}},"📍 "+S.gps.lat.toFixed(4)+", "+S.gps.lng.toFixed(4)+" · Verified ✓"),
    ),
    tabBar,errBox,body,
    d({style:{color:C.muted,fontSize:"11px",textAlign:"center",marginTop:"20px"}},"By continuing you agree to our Terms & Privacy Policy"),
  );
  root.appendChild(card);return root;
}

function screenCall(){
  const call=S.call;
  const fmt=sec=>String(Math.floor(sec/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0");
  const root=d({style:{position:"fixed",inset:0,background:"#000",zIndex:1000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}});
  if(call.video){
    root.append(h("video",{id:"rv",autoplay:"",playsinline:"",style:{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}));
    root.append(h("video",{id:"lv",autoplay:"",muted:"",playsinline:"",style:{position:"absolute",bottom:"100px",right:"20px",width:"120px",height:"160px",borderRadius:"12px",objectFit:"cover",border:"2px solid rgba(255,255,255,.2)",zIndex:2}}));
    setTimeout(()=>{if(localStr){const lv=document.getElementById("lv");if(lv)lv.srcObject=localStr;}},100);
  }
  const ov=d({style:{position:"relative",zIndex:3,textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:"14px"}});
  ov.append(av(call.remoteName,90,false,call.remotePhoto),h("h2",{style:{color:"#fff",margin:0,fontSize:"24px",fontWeight:700}},call.remoteName),d({style:{color:"rgba(255,255,255,.6)",fontSize:"16px"}},call.status==="calling"?"Calling…":call.status==="connected"?fmt(call.duration):call.status==="failed"?"Call failed":"…"));
  const ctls=d({style:{display:"flex",gap:"16px",marginTop:"24px",flexWrap:"wrap",justifyContent:"center"}});
  let muted=false,camOff=false;
  function mkCBtn(ic,label,fn,red=false){
    const btn2=d({style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",cursor:"pointer"},onClick:fn});
    btn2.append(d({style:{width:"56px",height:"56px",borderRadius:"50%",background:red?"#ef4444":"rgba(255,255,255,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px"}},ic),s({style:{color:"#fff",fontSize:"11px"}},label));
    return btn2;
  }
  const muteBtn=mkCBtn("🎙","Mute",()=>{muted=!muted;localStr?.getAudioTracks().forEach(t=>t.enabled=!muted);muteBtn.querySelector("div").style.background=muted?"rgba(255,255,255,.4)":"rgba(255,255,255,.15)";});
  ctls.append(muteBtn);
  if(call.video)ctls.append(mkCBtn("🎥","Camera",()=>{camOff=!camOff;localStr?.getVideoTracks().forEach(t=>t.enabled=!camOff);}));
  ctls.append(mkCBtn("🔊","Speaker",()=>{}),mkCBtn("📵","End",()=>endCall(),true));
  ov.appendChild(ctls);root.appendChild(ov);return root;
}

  const hdr=d({style:{padding:"14px 16px",display:"flex",alignItems:"center",gap:"10px",borderBottom:"1px solid "+C.border}});
  hdr.append(av(S.user.displayName||S.user.email,42,true,S.user.photoURL),
    d({style:{flex:1}},d({style:{color:C.text,fontWeight:700,fontSize:"15px"}},S.user.displayName||S.user.email),d({style:{color:C.accent,fontSize:"11px"}},"● Online")),
    b({style:{background:"none",border:"none",color:C.muted,fontSize:"20px",padding:"6px",borderRadius:"8px"},title:"New chat",onClick(){S.showNew=!S.showNew;render();}},"✏️"),
    b({style:{background:"none",border:"none",color:C.muted,fontSize:"18px",padding:"6px",borderRadius:"8px"},title:"Sign out",async onClick(){await setOnline(uid,"offline");await signOut(auth);S.activeChat=null;S.messages=[];render();}},"⏏"),

  const isImg=msg.file?.type?.startsWith("image/"),isVid=msg.file?.type?.startsWith("video/"),isAud=msg.file?.type?.startsWith("audio/");
  if(isImg){
    const img=h("img",{src:msg.file.url,style:{maxWidth:"100%",maxHeight:"260px",borderRadius:"8px",display:"block",marginBottom:msg.text?"6px":"0",cursor:"zoom-in",objectFit:"cover"}});
    img.addEventListener("click",()=>{const ov=d({style:{position:"fixed",inset:0,background:"#000e",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}},h("img",{src:msg.file.url,style:{maxWidth:"95vw",maxHeight:"95vh",objectFit:"contain"}}));ov.addEventListener("click",()=>ov.remove());document.body.appendChild(ov);});
    bub.appendChild(img);
  }
  if(isVid)bub.appendChild(h("video",{controls:"",src:msg.file.url,style:{maxWidth:"100%",maxHeight:"240px",borderRadius:"8px",display:"block",marginBottom:msg.text?"6px":"0"}}));
  if(isAud){const ar=d({style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:msg.text?"6px":"0",minWidth:"180px"}});ar.append(s({style:{fontSize:"22px"}},"🎙"),h("audio",{controls:"",src:msg.file.url}));bub.appendChild(ar);}
  if(msg.file&&!isImg&&!isVid&&!isAud){const fa=h("a",{href:msg.file.url,target:"_blank",rel:"noreferrer",style:{display:"flex",alignItems:"center",gap:"10px",textDecoration:"none",background:C.card,borderRadius:"8px",padding:"8px 10px",marginBottom:msg.text?"6px":"0"}});fa.append(s({style:{fontSize:"26px"}},fIcon(msg.file.type)),d({},d({style:{color:C.text,fontSize:"13px",fontWeight:600,wordBreak:"break-all"}},msg.file.name),d({style:{color:C.muted,fontSize:"11px"}},fmtB(msg.file.size))));bub.appendChild(fa);}
  if(msg.location){const la=h("a",{href:"https://maps.google.com/?q="+msg.location.lat+","+msg.location.lng,target:"_blank",rel:"noreferrer",style:{display:"flex",alignItems:"center",gap:"8px",textDecoration:"none",background:C.card,borderRadius:"8px",padding:"8px 12px",marginBottom:msg.text?"6px":"0"}});la.append(s({style:{fontSize:"24px"}},"📍"),d({},d({style:{color:C.text,fontSize:"13px",fontWeight:600}},"Shared Location"),d({style:{color:C.muted,fontSize:"11px"}},msg.location.lat.toFixed(4)+", "+msg.location.lng.toFixed(4)),d({style:{color:C.accent,fontSize:"11px"}},"Tap to open Maps")));bub.appendChild(la);}
  if(msg.text)bub.appendChild(d({style:{color:C.text,fontSize:"14px",lineHeight:"1.55",wordBreak:"break-word"}},msg.text));
  const tr=d({style:{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:"4px",marginTop:"3px",color:isMe?"#a7f3d0":C.muted,fontSize:"10px"}});
  tr.append(fmtT(msg.createdAt));if(isMe)tr.appendChild(s({},msg.readBy?.length>1?"✓✓":"✓"));
  bub.appendChild(tr);
  let pt=null;
  bub.addEventListener("mousedown",()=>{pt=setTimeout(()=>ctxMenu(msg,bub,isMe),500);});
  bub.addEventListener("mouseup",()=>clearTimeout(pt));
  bub.addEventListener("touchstart",()=>{pt=setTimeout(()=>ctxMenu(msg,bub,isMe),500);},{passive:true});
  bub.addEventListener("touchend",()=>clearTimeout(pt));
  bub.addEventListener("contextmenu",e=>{e.preventDefault();ctxMenu(msg,bub,isMe);});
  row.appendChild(bub);
  const qr=b({style:{background:"none",border:"none",color:C.muted,fontSize:"13px",opacity:.5,padding:"2px",flexShrink:0},onClick:()=>rxPicker(msg,wrap,isMe)},"😊");
  row.appendChild(qr);wrap.appendChild(row);
  const rxs=msg.reactions||{},rxE=Object.entries(rxs).filter(([,u])=>u?.length>0);
  if(rxE.length){const rxRow=d({style:{display:"flex",gap:"4px",marginTop:"3px",flexWrap:"wrap",justifyContent:isMe?"flex-end":"flex-start"}});for(const[e,u]of rxE){const rb=d({style:{background:C.card,border:"1px solid "+C.border,borderRadius:"20px",padding:"2px 8px",fontSize:"12px",cursor:"pointer",display:"flex",alignItems:"center",gap:"3px"},onClick:()=>reactMsg(msg.id,e)});rb.append(e,s({style:{color:C.muted}},u.length));rxRow.appendChild(rb);}wrap.appendChild(rxRow);}
  return wrap;
}
function rxPicker(msg,wrap,isMe){
  document.querySelectorAll(".rxp").forEach(e=>e.remove());
  const p=d({class:"rxp",style:{position:"absolute",zIndex:50,bottom:"100%",[isMe?"right":"left"]:"0",background:C.panel,border:"1px solid "+C.border,borderRadius:"30px",padding:"8px 12px",display:"flex",gap:"10px",boxShadow:"0 4px 24px rgba(0,0,0,.5)"}});
  for(const e of RX_EMOJIS)p.appendChild(s({style:{fontSize:"24px",cursor:"pointer"},onClick:()=>{reactMsg(msg.id,e);p.remove();render();}},e));
  p.appendChild(s({style:{color:C.muted,cursor:"pointer",fontSize:"16px",alignSelf:"center"},onClick:()=>p.remove()},"✕"));
  wrap.style.position="relative";wrap.appendChild(p);
}
function ctxMenu(msg,bub,isMe){
  document.querySelectorAll(".ctx").forEach(e=>e.remove());
  const menu=d({class:"ctx",style:{position:"fixed",zIndex:200,background:C.panel,border:"1px solid "+C.border,borderRadius:"12px",overflow:"hidden",boxShadow:"0 4px 24px rgba(0,0,0,.6)",minWidth:"170px"}});
  const r=bub.getBoundingClientRect();
  menu.style.top=Math.min(r.bottom+4,window.innerHeight-220)+"px";
  menu.style[isMe?"right":"left"]=isMe?(window.innerWidth-r.right)+"px":r.left+"px";
  const items=[
    ["↩️ Reply",()=>{S.replyTo=msg;render();}],
    ["📋 Copy",()=>navigator.clipboard.writeText(msg.text||"")],
    ["⭐ Star",()=>{}],
    ...(isMe?[["🗑️ Delete for me",()=>delMsg(msg.id,false)],["🗑️ Delete for everyone",()=>delMsg(msg.id,true)]]:[[],[]].slice(0,0)),
  ];
  for(const[label,fn]of items){const item=d({style:{padding:"11px 16px",color:label.includes("Delete")?C.red:C.text,fontSize:"14px",cursor:"pointer",borderBottom:"1px solid "+C.border+"20"},onClick(){fn();menu.remove();}},label);menu.appendChild(item);}
  menu.appendChild(d({style:{padding:"9px 16px",color:C.muted,fontSize:"13px",cursor:"pointer"},onClick:()=>menu.remove()},"Cancel"));
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener("click",()=>menu.remove(),{once:true}),10);
}

/* ── Main render ─────────────────────────────── */
function render(){
  const root=document.getElementById("app");root.innerHTML="";
  if(S.loading){root.appendChild(d({style:{height:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.accent,fontSize:"48px"}},"💬"));return;}
  if(!S.gps){root.appendChild(screenGPS());return;}
  if(!S.user){root.appendChild(screenLogin());return;}
  if(S.call){root.appendChild(screenCall());return;}
  const layout=d({style:{height:"100vh",display:"flex",overflow:"hidden"}});
  const showSide=!S.mobile||!S.activeChat;
  const showChat=!S.mobile||!!S.activeChat;
  if(showSide){const sw=d({style:{width:S.mobile?"100%":"360px",flexShrink:0,height:"100%"}});sw.appendChild(buildSidebar());layout.appendChild(sw);}
  if(showChat)layout.appendChild(buildChat());
  root.appendChild(layout);
}

/* ── Boot ────────────────────────────────────── */
render();
onAuthStateChanged(auth,async u=>{
  S.loading=false;
  if(u){S.user=u;subChats(u.uid);subContacts(u.uid);subStatuses();}
  else{S.user=null;S.chats=[];S.contacts=[];S.messages=[];S.activeChat=null;}
  render();
});
window.addEventListener("resize",()=>{S.mobile=window.innerWidth<768;render();});
window.addEventListener("beforeunload",()=>{if(S.user)setOnline(S.user.uid,"offline");});
navigator.geolocation?.watchPosition(pos=>{if(!S.gps)return;S.gps={lat:pos.coords.latitude,lng:pos.coords.longitude};if(S.user)setOnline(S.user.uid,"online");render();},null,{enableHighAccuracy:true});
</script>
